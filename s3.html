<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SecureStay – Begehungsprotokoll & Bedarfsanalyse</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--bg2:#0a1628;--bg3:#0f1f3d;
  --border:#1e293b;--border2:#334155;
  --text:#e5e7eb;--muted:#9ca3af;--soft:#6b7280;
  --accent:#14b8a6;--accent2:#2dd4bf;--accent3:#99f6e4;
  --warn:#f59e0b;--danger:#ef4444;--ok:#22c55e;
  --na:#64748b;
  --r:12px;--rpill:999px;
  --sh:0 20px 48px rgba(0,0,0,.8);
}
html,body{min-height:100vh;background:radial-gradient(circle at 20% 10%,#0a1628 0,#020617 60%);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

/* ── HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(2,6,23,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;border-radius:8px;background:rgba(20,184,166,.12);border:1px solid rgba(20,184,166,.3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#f9fafb}
.logo-mark span{color:var(--accent)}
.logo-text{font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase}
.hdr-sub{font-family:ui-monospace,Consolas,monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);background:rgba(20,184,166,.08);padding:4px 12px;border-radius:var(--rpill);border:1px solid rgba(20,184,166,.2)}

/* ── LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px}

/* ── STEPPER */
.stepper{display:flex;gap:0;margin-bottom:40px;overflow-x:auto;padding-bottom:4px}
.step{display:flex;align-items:center;gap:0;flex-shrink:0}
.step-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:none;border:none;cursor:pointer;border-radius:var(--r);transition:.18s}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid var(--border2);color:var(--soft);background:var(--bg2);transition:.18s;flex-shrink:0}
.step-label{font-size:.78rem;color:var(--muted);white-space:nowrap;transition:.18s}
.step-btn:hover .step-label{color:var(--text)}
.step-btn.active .step-num{border-color:var(--accent);background:rgba(20,184,166,.15);color:var(--accent)}
.step-btn.active .step-label{color:var(--accent);font-weight:600}
.step-btn.done .step-num{border-color:var(--ok);background:rgba(34,197,94,.15);color:var(--ok)}
.step-btn.done .step-label{color:var(--ok)}
.step-line{width:24px;height:2px;background:var(--border);flex-shrink:0}
.step:last-child .step-line{display:none}

/* ── PANEL */
.panel{background:rgba(10,22,40,.7);border:1px solid var(--border);border-radius:16px;padding:28px 32px;box-shadow:var(--sh)}
.panel-title{font-size:1.3rem;font-weight:800;color:#f9fafb;margin-bottom:4px}
.panel-sub{font-size:.85rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
.norm-badge{display:inline-block;font-family:ui-monospace,Consolas,monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(20,184,166,.08);padding:2px 8px;border-radius:var(--rpill);border:1px solid rgba(20,184,166,.18);margin-bottom:20px}

/* ── META FORM */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-family:ui-monospace,Consolas,monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.fg input,.fg select,.fg textarea{background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.87rem;font-family:inherit;outline:none;transition:.18s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(20,184,166,.15)}
.fg select option{background:#0f172a}
.fg textarea{resize:vertical;min-height:80px}
.fg-full{grid-column:1/-1}

/* ── CHECK ITEMS */
.check-section{margin-bottom:24px}
.check-section-title{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.check-item{background:rgba(15,23,42,.6);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:.18s}
.check-item:hover{border-color:var(--border2)}
.check-item.status-ok{border-left:3px solid var(--ok)}
.check-item.status-mangel{border-left:3px solid var(--warn)}
.check-item.status-kritisch{border-left:3px solid var(--danger)}
.check-item.status-na{border-left:3px solid var(--na);opacity:.6}
.ci-top{display:flex;align-items:flex-start;gap:12px}
.ci-text{flex:1}
.ci-label{font-size:.88rem;color:#f9fafb;font-weight:600;margin-bottom:3px}
.ci-norm{font-family:ui-monospace,Consolas,monospace;font-size:.6rem;color:var(--accent);letter-spacing:.08em}
.ci-desc{font-size:.78rem;color:var(--muted);margin-top:3px;line-height:1.5}
.ci-btns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.ci-btn{padding:5px 11px;border-radius:var(--rpill);border:1px solid transparent;font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.ci-btn.ok{border-color:rgba(34,197,94,.3);color:#86efac;background:rgba(34,197,94,.08)}
.ci-btn.ok.active{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.3)}
.ci-btn.mangel{border-color:rgba(245,158,11,.3);color:#fcd34d;background:rgba(245,158,11,.08)}
.ci-btn.mangel.active{background:rgba(245,158,11,.2);border-color:#f59e0b;color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.3)}
.ci-btn.kritisch{border-color:rgba(239,68,68,.3);color:#fca5a5;background:rgba(239,68,68,.08)}
.ci-btn.kritisch.active{background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.3)}
.ci-btn.na{border-color:rgba(100,116,139,.3);color:var(--muted);background:transparent}
.ci-btn.na.active{background:rgba(100,116,139,.2);border-color:var(--na);color:var(--muted)}
.ci-note{margin-top:10px;display:none}
.ci-note.show{display:block}
.ci-note input{width:100%;background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:.8rem;outline:none}
.ci-note input:focus{border-color:var(--accent2)}

/* ── NAV BTNS */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:32px;gap:12px}
.btn-primary{background:var(--accent);color:#0f172a;border:none;border-radius:var(--rpill);padding:11px 24px;font-size:.9rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;box-shadow:0 8px 20px rgba(20,184,166,.4);transition:.18s}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--rpill);padding:11px 20px;font-size:.88rem;font-weight:500;cursor:pointer;transition:.18s}
.btn-secondary:hover{border-color:var(--border2);background:rgba(15,23,42,.8)}

/* ── PROGRESS BAR */
.progress-bar{height:3px;background:var(--border);border-radius:3px;margin-bottom:32px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:.4s}

/* ── REPORT */
.report-header{background:linear-gradient(135deg,rgba(20,184,166,.1),rgba(15,23,42,.9));border:1px solid rgba(20,184,166,.3);border-radius:16px;padding:32px;margin-bottom:24px}
.report-title{font-size:1.6rem;font-weight:800;color:#f9fafb;margin-bottom:6px}
.report-meta{font-size:.82rem;color:var(--muted);line-height:1.7}
.report-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:rgba(10,22,40,.8);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.kpi-val{font-size:2rem;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.kpi.ok .kpi-val{color:var(--ok)}
.kpi.warn .kpi-val{color:var(--warn)}
.kpi.danger .kpi-val{color:var(--danger)}
.kpi.total .kpi-val{color:var(--accent)}
.risk-level{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:var(--rpill);font-size:.85rem;font-weight:700;margin-bottom:24px}
.risk-level.gering{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:#4ade80}
.risk-level.mittel{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
.risk-level.hoch{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171}
.risk-level.kritisch{background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.5);color:#fca5a5;animation:pulse-danger 2s ease-in-out infinite}
@keyframes pulse-danger{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

.finding{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start}
.finding.kritisch{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
.finding.mangel{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.finding-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.finding.kritisch .finding-icon{background:rgba(239,68,68,.15)}
.finding.mangel .finding-icon{background:rgba(245,158,11,.15)}
.finding-label{font-size:.88rem;font-weight:600;color:#f9fafb;margin-bottom:2px}
.finding-section{font-size:.72rem;color:var(--muted)}
.finding-note{font-size:.78rem;color:var(--muted);margin-top:4px;font-style:italic}
.finding-cost{margin-left:auto;text-align:right;flex-shrink:0}
.finding-cost-val{font-size:.85rem;font-weight:700;color:var(--accent)}
.finding-cost-lbl{font-size:.62rem;color:var(--soft)}

.cost-summary{background:rgba(20,184,166,.06);border:1px solid rgba(20,184,166,.2);border-radius:12px;padding:20px 24px;margin-bottom:24px}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cost-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px;font-weight:700;font-size:1rem}
.cost-row span:first-child{color:var(--muted);font-size:.85rem}
.cost-row span:last-child{color:var(--accent);font-weight:600}
.cost-row:last-child span{color:#f9fafb}

.prio-section{margin-bottom:20px}
.prio-title{font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prio-title.k{color:var(--danger)}
.prio-title.m{color:var(--warn)}

.print-btn{background:rgba(15,23,42,.8);color:var(--text);border:1px solid var(--border2);border-radius:var(--rpill);padding:10px 20px;font-size:.85rem;cursor:pointer;transition:.18s}
.print-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:768px){
  .hdr{padding:12px 16px}
  .wrap{padding:20px 16px 60px}
  .meta-grid{grid-template-columns:1fr}
  .report-kpis{grid-template-columns:1fr 1fr}
  .ci-btns{gap:4px}
  .ci-btn{padding:4px 8px;font-size:.65rem}
  .panel{padding:20px 16px}
}
@media print{
  .hdr,.stepper,.progress-bar,.nav-row,.print-btn{display:none!important}
  body{background:white;color:#111}
  .panel,.report-header,.finding,.kpi,.cost-summary{background:white!important;border-color:#ccc!important;box-shadow:none!important}
  .panel-title,.report-title,.finding-label,.kpi-val{color:#111!important}
  .kpi-lbl,.finding-section,.report-meta,.cost-row span:first-child{color:#555!important}
}
</style>
</head>
<body>

  <div class="logo">

</header>

<div class="wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11%"></div></div>

  <div class="stepper" id="stepper"></div>
  <div id="mainContent"></div>
</div>

  },
  {
    id:'brand', label:'Brandschutz (physisch)',

    items:[
      {id:'b1', label:'Brandmeldeanlage (BMA)', norm:'DIN 14675 · VDE 0833-2', desc:'BMA mit automatischen Rauch-/Wärmemelder, aufgeschaltet auf Feuerwehr.', costs:{mangel:'8.000–25.000', kritisch:'25.000–80.000'}},
      {id:'b2', label:'Handlöscher & Löscheinrichtungen', norm:'DIN EN 3 · ASR A2.2', desc:'Ausreichend Feuerlöscher, korrekte Klassen, gewartet, sichtbar platziert.', costs:{mangel:'500–2.000', kritisch:'2.000–6.000'}},
      {id:'b3', label:'Fluchtwege & Notausgänge', norm:'ASR A2.3 · DIN EN 1838', desc:'Freie, gekennzeichnete Fluchtwege, Notbeleuchtung funktionsfähig.', costs:{mangel:'1.000–4.000', kritisch:'4.000–12.000'}},
      {id:'b4', label:'Brandschutzplan & Brandschutzordnung', norm:'DIN 14096 Teil A/B/C', desc:'Aktueller Brandschutzplan, Aushang und dokumentierte Brandschutzordnung.', costs:{mangel:'800–2.500', kritisch:'2.500–6.000'}},
      {id:'b5', label:'Brandschutzbeauftragter benannt', norm:'DGUV I 205-003', desc:'Schriftliche Bestellung, Nachweis der Ausbildung vorhanden.', costs:{mangel:'2.000–5.000', kritisch:'5.000–10.000'}},
    ]
  },
  {
    id:'organisation', label:'Organisation & Prozesse',
    norm:'ISO 31000 · ISO 22301 · NIS2 §30 BSIG',
    icon:'📋',
    sub:'Sicherheitsorganisation, Richtlinien, Schulungen und Business Continuity Management.',
    items:[
      {id:'o1', label:'Sicherheitsrichtlinie dokumentiert', norm:'ISO 31000 §4.2', desc:'Schriftliche Sicherheitsrichtlinie, von GF unterzeichnet, aktuell.', costs:{mangel:'2.000–5.000', kritisch:'5.000–10.000'}},
      {id:'o2', label:'Sicherheitsverantwortlicher benannt', norm:'NIS2 §38 BSIG', desc:'Namentliche Benennung, Stellvertretung, Kompetenznachweis.', costs:{mangel:'1.000–3.000', kritisch:'3.000–8.000'}},
      {id:'o3', label:'Mitarbeiterschulungen Security Awareness', norm:'ISO 31000 · NIS2', desc:'Regelmäßige Schulungen, Teilnahmenachweise, Schulungskonzept.', costs:{mangel:'3.000–8.000', kritisch:'8.000–20.000'}},
      {id:'o4', label:'Notfall- & Krisenplan vorhanden', norm:'ISO 22301 · DIN EN ISO 22301', desc:'Schriftlicher Notfallplan, getestet, Verantwortlichkeiten klar.', costs:{mangel:'4.000–10.000', kritisch:'10.000–25.000'}},
      {id:'o5', label:'Zuverlässigkeitsüberprüfung Personal', norm:'KRITIS-DachG § 13', desc:'Verfahren zur Überprüfung von Mitarbeitern in sicherheitsrelevanten Positionen.', costs:{mangel:'1.500–4.000', kritisch:'4.000–10.000'}},
      {id:'o6', label:'Sicherheitsreviews & Audits', norm:'ISO 31000 §8', desc:'Regelmäßige interne oder externe Sicherheitsaudits dokumentiert.', costs:{mangel:'3.000–8.000', kritisch:'8.000–15.000'}},
      {id:'o7', label:'Lieferanten & Dienstleister geprüft', norm:'ISO 31000 · NIS2', desc:'Sicherheitsanforderungen in Verträgen, Dienstleister-Audits durchgeführt.', costs:{mangel:'2.000–5.000', kritisch:'5.000–12.000'}},
    ]
  },
  {
    id:'it_physisch', label:'IT-Infrastruktur (physisch)',
    norm:'ISO/IEC 27001 A.11 · NIS2 §30 · BSI IT-Grundschutz',
    icon:'🖥️',
    sub:'Physischer Schutz von Serverräumen, Netzwerkschränken und Endgeräten.',
    items:[
      {id:'i1', label:'Serverraum / RZ physisch gesichert', norm:'ISO/IEC 27001 A.11.1', desc:'Separater Zugang, ZKS, Klimatisierung, USV vorhanden und gesichert.', costs:{mangel:'5.000–15.000', kritisch:'15.000–50.000'}},
      {id:'i2', label:'Netzwerkschränke abgesichert', norm:'ISO/IEC 27001 A.11.2', desc:'Netzwerkschränke verschlossen, Zugang nur autorisierten Personen.', costs:{mangel:'500–2.000', kritisch:'2.000–6.000'}},
      {id:'i3', label:'Kabelführung & Schutz', norm:'ISO/IEC 27001 A.11.2', desc:'Schutz vor physischem Zugriff, Beschädigung oder Abhören von Leitungen.', costs:{mangel:'1.000–4.000', kritisch:'4.000–12.000'}},
      {id:'i4', label:'Entsorgung von Datenträgern', norm:'DIN 66399 · ISO 21964', desc:'Zertifizierte Vernichtung, Vernichtungsnachweis vorhanden.', costs:{mangel:'500–2.000', kritisch:'2.000–5.000'}},
      {id:'i5', label:'Clean-Desk-Policy umgesetzt', norm:'ISO/IEC 27001 A.11.2', desc:'Schriftliche Policy, stichprobenweise Kontrolle, keine Unterlagen offen.', costs:{mangel:'500–1.500', kritisch:'1.500–4.000'}},
    ]
  },
];

const STEPS = [
  {id:'meta', label:'Objektdaten'},
  ...CHECKS.map(c=>({id:c.id, label:c.label})),
  {id:'report', label:'Bedarfsbericht'}
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = {
  currentStep: 0,
  meta: { objekt:'', adresse:'', datum:'', pruefer:'', auftraggeber:'', anlass:'', notizen:'' },
  findings: {} // {itemId: {status:'ok'|'mangel'|'kritisch'|'na', note:''}}
};

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  renderStepper();
  renderProgress();
  const step = STEPS[state.currentStep];
  if (step.id === 'meta') renderMeta();
  else if (step.id === 'report') renderReport();
  else {
    const check = CHECKS.find(c=>c.id===step.id);
    if (check) renderChecklist(check);
  }
}

function renderStepper() {
  const el = document.getElementById('stepper');
  el.innerHTML = STEPS.map((s,i)=>{
    const isDone = i < state.currentStep;
    const isActive = i === state.currentStep;
    return `<div class="step">
      <button class="step-btn ${isActive?'active':''} ${isDone?'done':''}" onclick="goToStep(${i})">
        <span class="step-num">${isDone?'✓':(i+1)}</span>
        <span class="step-label">${s.label}</span>
      </button>
      <div class="step-line"></div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const pct = Math.round((state.currentStep / (STEPS.length-1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderMeta() {
  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="panel-title">Objektdaten & Auftragsinformationen</div>
    <p class="panel-sub">Erfassen Sie die Stammdaten des zu begehenden Objekts. Diese Informationen erscheinen im abschließenden Bedarfsbericht.</p>
    <div class="meta-grid">
      <div class="fg">
        <label>Objektbezeichnung</label>
        <input type="text" id="m_objekt" value="${e(state.meta.objekt)}" placeholder="z.B. Verwaltungsgebäude Hauptsitz" oninput="state.meta.objekt=this.value">
      </div>
      <div class="fg">
        <label>Auftraggeber / Unternehmen</label>
        <input type="text" id="m_auftraggeber" value="${e(state.meta.auftraggeber)}" placeholder="z.B. Musterfirma GmbH" oninput="state.meta.auftraggeber=this.value">
      </div>
      <div class="fg fg-full">
        <label>Adresse / Standort</label>
        <input type="text" id="m_adresse" value="${e(state.meta.adresse)}" placeholder="Straße, PLZ, Ort" oninput="state.meta.adresse=this.value">
      </div>
      <div class="fg">
        <label>Datum der Begehung</label>
        <input type="date" id="m_datum" value="${e(state.meta.datum)}" oninput="state.meta.datum=this.value">
      </div>
      <div class="fg">
        <label>Prüfer / Berater</label>
        <input type="text" id="m_pruefer" value="${e(state.meta.pruefer)}" placeholder="Name des Begehers" oninput="state.meta.pruefer=this.value">
      </div>
      <div class="fg">
        <label>Anlass der Begehung</label>
        <select id="m_anlass" onchange="state.meta.anlass=this.value">
          <option value="" ${!state.meta.anlass?'selected':''}>Bitte wählen...</option>
          <option value="Erstbegehung" ${state.meta.anlass==='Erstbegehung'?'selected':''}>Erstbegehung</option>
          <option value="Folgebegehung" ${state.meta.anlass==='Folgebegehung'?'selected':''}>Folgebegehung / Review</option>
          <option value="KRITIS-Compliance" ${state.meta.anlass==='KRITIS-Compliance'?'selected':''}>KRITIS-Compliance</option>
          <option value="NIS2-Audit" ${state.meta.anlass==='NIS2-Audit'?'selected':''}>NIS2-Audit</option>
          <option value="Versicherung" ${state.meta.anlass==='Versicherung'?'selected':''}>Versicherungsanforderung</option>
          <option value="Sonstiges" ${state.meta.anlass==='Sonstiges'?'selected':''}>Sonstiges</option>
        </select>
      </div>
      <div class="fg fg-full">
        <label>Allgemeine Notizen / Vorbemerkungen</label>
        <textarea id="m_notizen" placeholder="Besonderheiten, Vorinformationen, Zugangsbeschränkungen..." oninput="state.meta.notizen=this.value">${e(state.meta.notizen)}</textarea>
      </div>
    </div>
    <div class="nav-row">
      <div></div>
      <button class="btn-primary" onclick="nextStep()">Begehung starten →</button>
    </div>
  </div>`;
}

function renderChecklist(check) {
  const items = check.items.map(item => {
    const f = state.findings[item.id] || {};
    const s = f.status || '';
    return `<div class="check-item ${s?'status-'+s:''}" id="ci_${item.id}">
      <div class="ci-top">
        <div class="ci-text">
          <div class="ci-label">${item.label}</div>
          <div class="ci-norm">${item.norm}</div>
          <div class="ci-desc">${item.desc}</div>
        </div>
        <div class="ci-btns">
          <button class="ci-btn ok ${s==='ok'?'active':''}" onclick="setStatus('${item.id}','ok')">✓ OK</button>
          <button class="ci-btn mangel ${s==='mangel'?'active':''}" onclick="setStatus('${item.id}','mangel')">⚠ Mangel</button>
          <button class="ci-btn kritisch ${s==='kritisch'?'active':''}" onclick="setStatus('${item.id}','kritisch')">✕ Kritisch</button>
          <button class="ci-btn na ${s==='na'?'active':''}" onclick="setStatus('${item.id}','na')">– N/A</button>
        </div>
      </div>
      <div class="ci-note ${s&&s!=='ok'&&s!=='na'?'show':''}" id="note_${item.id}">
        <input type="text" placeholder="Notiz / Beobachtung eingeben..." value="${e(f.note||'')}" oninput="setNote('${item.id}',this.value)">
      </div>
    </div>`;
  }).join('');

  const done = check.items.filter(i=>state.findings[i.id]?.status).length;
  const total = check.items.length;

  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="norm-badge">${check.norm}</div>
    <div class="panel-title">${check.icon} ${check.label}</div>
    <p class="panel-sub">${check.sub} <strong style="color:var(--accent)">${done}/${total} bewertet.</strong></p>
    <div class="check-section">
      <div class="check-section-title">Prüfpunkte</div>
      ${items}
    </div>
    <div class="nav-row">
      <button class="btn-secondary" onclick="prevStep()">← Zurück</button>
      <button class="btn-primary" onclick="nextStep()">Weiter →</button>
    </div>
  </div>`;
}

function renderReport() {
  // Aggregate
  let kritisch=[], mangel=[], ok=0, na=0;
  let costMin=0, costMax=0;
  let costBySection = {};

  CHECKS.forEach(check => {
    check.items.forEach(item => {
      const f = state.findings[item.id];
      const s = f?.status;
      if (s==='ok') ok++;
      else if (s==='na') na++;
      else if (s==='kritisch') {
        kritisch.push({...item, note:f?.note||'', section:check.label, icon:check.icon});
        const [mn,mx] = (item.costs.kritisch||'0–0').split('–').map(x=>parseInt(x.replace(/\D/g,''))||0);
        costMin+=mn; costMax+=mx;
        costBySection[check.label] = (costBySection[check.label]||[]);
        costBySection[check.label].push({label:item.label, cost:item.costs.kritisch, prio:'kritisch'});
      } else if (s==='mangel') {
        mangel.push({...item, note:f?.note||'', section:check.label, icon:check.icon});
        const [mn,mx] = (item.costs.mangel||'0–0').split('–').map(x=>parseInt(x.replace(/\D/g,''))||0);
        costMin+=mn; costMax+=mx;
        costBySection[check.label] = (costBySection[check.label]||[]);
        costBySection[check.label].push({label:item.label, cost:item.costs.mangel, prio:'mangel'});
      }
    });
  });

  const total = kritisch.length + mangel.length + ok + na;
  const assessed = kritisch.length + mangel.length + ok;

  let riskLevel, riskClass;
  if (kritisch.length >= 5 || (kritisch.length >= 3 && mangel.length >= 4)) { riskLevel='Kritisch'; riskClass='kritisch'; }
  else if (kritisch.length >= 2 || mangel.length >= 6) { riskLevel='Hoch'; riskClass='hoch'; }
  else if (kritisch.length >= 1 || mangel.length >= 3) { riskLevel='Mittel'; riskClass='mittel'; }
  else { riskLevel='Gering'; riskClass='gering'; }

  const datumStr = state.meta.datum ? new Date(state.meta.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}) : '–';

  const findingRow = (f, prio) => `
    <div class="finding ${prio}">
      <div class="finding-icon">${f.icon}</div>
      <div>
        <div class="finding-label">${f.label}</div>
        <div class="finding-section">${f.section} · <span style="font-family:ui-monospace,Consolas,monospace;font-size:.6rem">${f.norm}</span></div>
        ${f.note ? `<div class="finding-note">"${f.note}"</div>` : ''}
      </div>
      <div class="finding-cost">
        <div class="finding-cost-val">€ ${f.costs[prio]}</div>
        <div class="finding-cost-lbl">Kostenschätzung</div>
      </div>
    </div>`;

  document.getElementById('mainContent').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div style="font-size:.75rem;color:var(--muted)">Bericht erstellt ${new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'})}</div>
    <div style="display:flex;gap:8px">
      <button class="print-btn" onclick="window.print()">🖨 Drucken / PDF</button>
    </div>
  </div>

  <div class="report-header">
    <div style="font-family:ui-monospace,Consolas,monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px">SecureStay Solutions · Begehungsprotokoll & Bedarfsanalyse</div>
    <div class="report-title">${e(state.meta.objekt)||'Objekt (ohne Bezeichnung)'}</div>
    <div class="report-meta">
      ${state.meta.auftraggeber?`<strong style="color:#f9fafb">${e(state.meta.auftraggeber)}</strong> · `:''} 
      ${state.meta.adresse?`${e(state.meta.adresse)} · `:''}
      Begehung: ${datumStr}
      ${state.meta.pruefer?` · Prüfer: <strong style="color:#f9fafb">${e(state.meta.pruefer)}</strong>`:''}
      ${state.meta.anlass?` · Anlass: ${e(state.meta.anlass)}`:''}
    </div>
  </div>

  <div class="report-kpis">
    <div class="kpi danger"><div class="kpi-val">${kritisch.length}</div><div class="kpi-lbl">Kritische Mängel</div></div>
    <div class="kpi warn"><div class="kpi-val">${mangel.length}</div><div class="kpi-lbl">Mängel</div></div>
    <div class="kpi ok"><div class="kpi-val">${ok}</div><div class="kpi-lbl">Bestanden</div></div>
    <div class="kpi total"><div class="kpi-val">${assessed}</div><div class="kpi-lbl">Bewertet gesamt</div></div>
  </div>

  <div class="risk-level ${riskClass}">
    <span>●</span> Gesamtrisiko: <strong>${riskLevel}</strong>
  </div>

  ${kritisch.length>0?`
  <div class="prio-section">
    <div class="prio-title k">✕ Kritische Mängel – sofortiger Handlungsbedarf (${kritisch.length})</div>
    ${kritisch.map(f=>findingRow(f,'kritisch')).join('')}
  </div>`:''}

  ${mangel.length>0?`
  <div class="prio-section">
    <div class="prio-title m">⚠ Mängel – mittelfristiger Handlungsbedarf (${mangel.length})</div>
    ${mangel.map(f=>findingRow(f,'mangel')).join('')}
  </div>`:''}

  ${kritisch.length===0&&mangel.length===0?`
  <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:28px;text-align:center;margin-bottom:24px">
    <div style="font-size:2rem;margin-bottom:8px">✅</div>
    <div style="font-size:1rem;font-weight:700;color:#4ade80;margin-bottom:6px">Keine Mängel festgestellt</div>
    <div style="font-size:.85rem;color:var(--muted)">Alle bewerteten Prüfpunkte wurden als konform eingestuft.</div>
  </div>`:''}

  <div class="cost-summary">
    <div style="font-family:ui-monospace,Consolas,monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px">Kostenschätzung Maßnahmenumsetzung</div>
    <div class="cost-row"><span>Sofortmaßnahmen (kritisch)</span><span>€ ${fmtCost(kritisch, 'kritisch')}</span></div>
    <div class="cost-row"><span>Mittelfristige Maßnahmen (Mängel)</span><span>€ ${fmtCost(mangel, 'mangel')}</span></div>
    <div class="cost-row"><span>Gesamtinvestitionsbedarf (Schätzung)</span><span>€ ${costMin.toLocaleString('de-DE')} – ${costMax.toLocaleString('de-DE')}</span></div>
    <div style="font-size:.72rem;color:var(--soft);margin-top:10px">* Kostenschätzungen basieren auf Erfahrungswerten. Genaue Angebote nach Objektbegehung durch Fachfirmen.</div>
  </div>

  ${state.meta.notizen?`
  <div style="background:rgba(15,23,42,.6);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px">
    <div style="font-family:ui-monospace,Consolas,monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">Notizen</div>
    <div style="font-size:.88rem;color:var(--muted);line-height:1.7">${e(state.meta.notizen)}</div>
  </div>`:''}

  <div style="background:rgba(20,184,166,.06);border:1px solid rgba(20,184,166,.2);border-radius:12px;padding:20px 24px;text-align:center">
    <div style="font-size:.72rem;color:var(--soft);margin-bottom:6px">Dieses Dokument wurde erstellt durch</div>
    <div style="font-weight:700;color:#f9fafb">SecureStay Solutions UG (haftungsbeschränkt)</div>
    <div style="font-size:.82rem;color:var(--muted);margin-top:4px">Kirchstr. 8b · 55270 Essenheim · securestay@outlook.de · +49 174 6703741</div>
  </div>

  <div class="nav-row">
    <button class="btn-secondary" onclick="prevStep()">← Zurück zur Begehung</button>
    <button class="btn-primary" onclick="window.print()">🖨 Bericht drucken / als PDF speichern</button>
  </div>`;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function fmtCost(items, prio) {
  let mn=0,mx=0;
  items.forEach(f=>{
    const [a,b] = (f.costs[prio]||'0–0').split('–').map(x=>parseInt(x.replace(/\D/g,''))||0);
    mn+=a; mx+=b;
  });
  if (mn===0&&mx===0) return '0';
  return `${mn.toLocaleString('de-DE')} – ${mx.toLocaleString('de-DE')}`;
}

function e(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(id, status) {
  if (!state.findings[id]) state.findings[id] = {status:'', note:''};
  state.findings[id].status = status;
  // Update UI without full re-render
  const ci = document.getElementById('ci_'+id);
  if (!ci) return;
  ci.className = 'check-item status-'+status;
  ci.querySelectorAll('.ci-btn').forEach(b=>{
    b.classList.toggle('active', b.classList.contains(status));
  });
  const noteEl = document.getElementById('note_'+id);
  if (noteEl) noteEl.classList.toggle('show', status==='mangel'||status==='kritisch');
  // Update counter
  updateCounter();
}

function setNote(id, val) {
  if (!state.findings[id]) state.findings[id] = {status:'', note:''};
  state.findings[id].note = val;
}

function updateCounter() {
  const step = STEPS[state.currentStep];
  const check = CHECKS.find(c=>c.id===step.id);
  if (!check) return;
  const done = check.items.filter(i=>state.findings[i.id]?.status).length;
  const total = check.items.length;
  const sub = document.querySelector('.panel-sub');
  if (sub) {
    sub.innerHTML = sub.innerHTML.replace(/\d+\/\d+ bewertet/, `${done}/${total} bewertet`);
  }
}

function goToStep(i) { state.currentStep=i; render(); window.scrollTo(0,0); }
function nextStep() { if(state.currentStep<STEPS.length-1){state.currentStep++;render();window.scrollTo(0,0);} }
function prevStep() { if(state.currentStep>0){state.currentStep--;render();window.scrollTo(0,0);} }

// Init
render();
</script>
