<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SecureStay: Analytics – Audit & Compliance Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--bg2:#0a1628;--bg3:#0f1f3d;--bg4:#111b2e;
  --surface:rgba(10,22,40,.7);--surface2:rgba(15,30,56,.6);
  --border:#1e293b;--border2:#334155;--border3:rgba(148,163,184,.12);
  --text:#e2e8f0;--text2:#f8fafc;--muted:#94a3b8;--soft:#64748b;--dim:#475569;
  --accent:#14b8a6;--accent2:#2dd4bf;--accent3:#99f6e4;--accentDim:rgba(20,184,166,.12);
  --orange:#f97316;--orange2:#fb923c;--orangeDim:rgba(249,115,22,.12);
  --warn:#eab308;--warnDim:rgba(234,179,8,.1);
  --danger:#ef4444;--dangerDim:rgba(239,68,68,.08);
  --ok:#22c55e;--okDim:rgba(34,197,94,.08);
  --na:#64748b;
  --purple:#a78bfa;--purpleDim:rgba(167,139,250,.1);
  --blue:#3b82f6;--blueDim:rgba(59,130,246,.1);
  --r:12px;--r2:16px;--rpill:999px;
  --sh:0 20px 48px rgba(0,0,0,.7);--sh2:0 4px 16px rgba(0,0,0,.4);
  --ff:'DM Sans',system-ui,sans-serif;
  --fh:'Outfit',system-ui,sans-serif;
  --fm:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(20,184,166,.04) 0,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(249,115,22,.03) 0,transparent 50%);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--soft)}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(2,6,23,.92);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;backdrop-filter:blur(16px) saturate(1.4)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,rgba(20,184,166,.15),rgba(249,115,22,.1));border:1px solid rgba(20,184,166,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:.95rem;color:var(--text2);position:relative;overflow:hidden}
.logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.06));pointer-events:none}
.logo-mark span{color:var(--accent)}
.logo-text{display:flex;flex-direction:column;gap:0}
.logo-name{font-family:var(--fh);font-weight:700;font-size:.92rem;letter-spacing:.04em;color:var(--text2)}
.logo-sub{font-family:var(--fm);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.8}
.hdr-badge{font-family:var(--fm);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);background:var(--orangeDim);padding:4px 14px;border-radius:var(--rpill);border:1px solid rgba(249,115,22,.2)}

/* ── LAYOUT ── */
.wrap{max-width:1160px;margin:0 auto;padding:28px 24px 100px;position:relative;z-index:1}

/* ── PROGRESS ── */
.progress-bar{height:3px;background:var(--border);border-radius:3px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--orange));border-radius:3px;transition:.5s cubic-bezier(.4,0,.2,1)}

/* ── STEPPER ── */
.stepper{display:flex;gap:0;margin-bottom:36px;overflow-x:auto;padding-bottom:6px;-ms-overflow-style:none;scrollbar-width:thin}
.step{display:flex;align-items:center;gap:0;flex-shrink:0}
.step-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:none;border:none;cursor:pointer;border-radius:var(--r);transition:.2s}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.65rem;font-weight:700;border:2px solid var(--border2);color:var(--soft);background:var(--bg2);transition:.2s;flex-shrink:0}
.step-label{font-family:var(--ff);font-size:.72rem;color:var(--muted);white-space:nowrap;transition:.2s;font-weight:500}
.step-btn:hover{background:rgba(255,255,255,.02)}
.step-btn:hover .step-label{color:var(--text)}
.step-btn.active .step-num{border-color:var(--accent);background:var(--accentDim);color:var(--accent)}
.step-btn.active .step-label{color:var(--accent);font-weight:600}
.step-btn.done .step-num{border-color:var(--ok);background:var(--okDim);color:var(--ok)}
.step-btn.done .step-label{color:var(--ok)}
.step-line{width:20px;height:2px;background:var(--border);flex-shrink:0}
.step:last-child .step-line{display:none}

/* ── PANEL ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px 32px;box-shadow:var(--sh);backdrop-filter:blur(6px)}
.panel-title{font-family:var(--fh);font-size:1.4rem;font-weight:800;color:var(--text2);margin-bottom:4px;letter-spacing:-.01em}
.panel-sub{font-size:.85rem;color:var(--muted);margin-bottom:24px;line-height:1.65}
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:28px 0}

/* ── BADGES ── */
.norm-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:var(--rpill);margin-bottom:16px;margin-right:6px}
.norm-badge.security{color:var(--accent);background:var(--accentDim);border:1px solid rgba(20,184,166,.2)}
.norm-badge.qm{color:var(--orange);background:var(--orangeDim);border:1px solid rgba(249,115,22,.2)}
.norm-badge.combined{color:var(--purple);background:var(--purpleDim);border:1px solid rgba(167,139,250,.2)}
.module-indicator{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:var(--rpill)}
.module-indicator.sec{color:var(--accent);background:var(--accentDim);border:1px solid rgba(20,184,166,.15)}
.module-indicator.qm{color:var(--orange);background:var(--orangeDim);border:1px solid rgba(249,115,22,.15)}

/* ── FORM ELEMENTS ── */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.fg input,.fg select,.fg textarea{background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:.87rem;font-family:var(--ff);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
.fg select option{background:#0f172a}
.fg textarea{resize:vertical;min-height:80px}
.fg-full{grid-column:1/-1}

/* ── MODULE SELECTOR ── */
.module-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.module-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r2);padding:24px 20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:.25s}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--sh2)}
.module-card.selected{border-color:var(--accent);background:rgba(20,184,166,.04)}
.module-card.selected::before{opacity:1}
.module-card.selected.sec::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.module-card.selected.qm::before{background:linear-gradient(90deg,var(--orange),var(--orange2))}
.module-card.selected.combo::before{background:linear-gradient(90deg,var(--accent),var(--purple),var(--orange))}
.mc-icon{font-size:2rem;margin-bottom:12px}
.mc-title{font-family:var(--fh);font-size:1.05rem;font-weight:700;color:var(--text2);margin-bottom:4px}
.mc-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
.mc-norms{margin-top:12px;display:flex;flex-wrap:wrap;gap:4px}
.mc-check{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;transition:.2s}
.module-card.selected .mc-check{border-color:var(--ok);color:var(--ok);background:var(--okDim)}

/* ── NORM SELECTOR ── */
.norm-selector{margin-bottom:24px}
.norm-group{margin-bottom:16px}
.norm-group-title{font-family:var(--fm);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.norm-group-title.sec{color:var(--accent)}
.norm-group-title.qm{color:var(--orange)}
.norm-chips{display:flex;flex-wrap:wrap;gap:6px}
.norm-chip{padding:7px 14px;border-radius:var(--rpill);border:1px solid var(--border);background:var(--bg2);font-size:.76rem;color:var(--muted);cursor:pointer;transition:.2s;font-weight:500;user-select:none}
.norm-chip:hover{border-color:var(--border2);color:var(--text)}
.norm-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accentDim)}
.norm-chip.active.qm-chip{border-color:var(--orange);color:var(--orange);background:var(--orangeDim)}

/* ── NORM DETAILS DROPDOWN ── */
.norm-details{margin-top:16px;background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.nd-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.nd-header:hover{background:rgba(255,255,255,.02)}
.nd-title{font-size:.82rem;font-weight:600;color:var(--text2)}
.nd-arrow{font-size:.7rem;color:var(--soft);transition:.2s}
.nd-header.open .nd-arrow{transform:rotate(180deg)}
.nd-body{max-height:0;overflow:hidden;transition:.3s ease}
.nd-body.open{max-height:2000px}
.nd-content{padding:0 16px 16px}
.nd-req{padding:8px 0;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--muted);display:flex;gap:8px;align-items:flex-start}
.nd-req:last-child{border-bottom:none}
.nd-req-num{font-family:var(--fm);font-size:.65rem;color:var(--accent);min-width:36px;flex-shrink:0;padding-top:1px}
.nd-req.qm-req .nd-req-num{color:var(--orange)}

/* ── CHECK ITEMS ── */
.check-section{margin-bottom:20px}
.check-section-title{font-family:var(--fm);font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.check-section-title.qm-section{color:var(--orange)}
.check-item{background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:.2s}
.check-item:hover{border-color:var(--border2)}
.check-item.status-ok{border-left:3px solid var(--ok)}
.check-item.status-mangel{border-left:3px solid var(--warn)}
.check-item.status-kritisch{border-left:3px solid var(--danger)}
.check-item.status-na{border-left:3px solid var(--na);opacity:.55}
.ci-top{display:flex;align-items:flex-start;gap:12px}
.ci-text{flex:1;min-width:0}
.ci-label{font-size:.87rem;color:var(--text2);font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ci-norm{font-family:var(--fm);font-size:.58rem;color:var(--accent);letter-spacing:.06em}
.ci-norm.qm{color:var(--orange)}
.ci-desc{font-size:.77rem;color:var(--muted);margin-top:3px;line-height:1.5}
.ci-btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.ci-btn{padding:5px 11px;border-radius:var(--rpill);border:1px solid transparent;font-size:.7rem;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap;font-family:var(--ff)}
.ci-btn.ok{border-color:rgba(34,197,94,.25);color:#86efac;background:rgba(34,197,94,.06)}
.ci-btn.ok.active{background:rgba(34,197,94,.18);border-color:#22c55e;color:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.25)}
.ci-btn.mangel{border-color:rgba(234,179,8,.25);color:#fde047;background:rgba(234,179,8,.06)}
.ci-btn.mangel.active{background:rgba(234,179,8,.18);border-color:#eab308;color:#eab308;box-shadow:0 0 8px rgba(234,179,8,.25)}
.ci-btn.kritisch{border-color:rgba(239,68,68,.25);color:#fca5a5;background:rgba(239,68,68,.06)}
.ci-btn.kritisch.active{background:rgba(239,68,68,.18);border-color:#ef4444;color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.25)}
.ci-btn.na{border-color:rgba(100,116,139,.25);color:var(--muted);background:transparent}
.ci-btn.na.active{background:rgba(100,116,139,.15);border-color:var(--na);color:var(--muted)}
.ci-note{margin-top:10px;display:none}
.ci-note.show{display:block}
.ci-note input{width:100%;background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:.8rem;font-family:var(--ff);outline:none}
.ci-note input:focus{border-color:var(--accent2)}

/* ── BUTTONS ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0d9488);color:#0f172a;border:none;border-radius:var(--rpill);padding:11px 26px;font-size:.88rem;font-weight:700;font-family:var(--ff);cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(20,184,166,.35);transition:.2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(20,184,166,.4)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--rpill);padding:11px 20px;font-size:.86rem;font-weight:500;font-family:var(--ff);cursor:pointer;transition:.2s}
.btn-secondary:hover{border-color:var(--border2);background:rgba(15,23,42,.6)}

/* ── REPORT ── */
.report-header{background:linear-gradient(135deg,rgba(20,184,166,.08),rgba(249,115,22,.05),rgba(15,23,42,.9));border:1px solid rgba(20,184,166,.25);border-radius:var(--r2);padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
.report-header::before{content:'';position:absolute;top:-40%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(20,184,166,.06),transparent 70%);pointer-events:none}
.report-title{font-family:var(--fh);font-size:1.6rem;font-weight:800;color:var(--text2);margin-bottom:6px;position:relative}
.report-meta{font-size:.82rem;color:var(--muted);line-height:1.7;position:relative}
.report-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kpi-val{font-family:var(--fh);font-size:1.8rem;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-lbl{font-family:var(--fm);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.kpi.ok .kpi-val{color:var(--ok)}.kpi.warn .kpi-val{color:var(--warn)}.kpi.danger .kpi-val{color:var(--danger)}.kpi.total .kpi-val{color:var(--accent)}.kpi.purple .kpi-val{color:var(--purple)}
.risk-level{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:var(--rpill);font-size:.85rem;font-weight:700;margin-bottom:24px;font-family:var(--ff)}
.risk-level.gering{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#4ade80}
.risk-level.mittel{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.35);color:#fbbf24}
.risk-level.hoch{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#f87171}
.risk-level.kritisch{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);color:#fca5a5;animation:pulse-d 2s ease-in-out infinite}
@keyframes pulse-d{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.25)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

.finding{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;transition:.15s}
.finding:hover{border-color:var(--border2)}
.finding.kritisch{border-color:rgba(239,68,68,.35);background:var(--dangerDim)}
.finding.mangel{border-color:rgba(234,179,8,.35);background:var(--warnDim)}
.finding-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.finding.kritisch .finding-icon{background:rgba(239,68,68,.12)}
.finding.mangel .finding-icon{background:rgba(234,179,8,.12)}
.finding-body{flex:1;min-width:0}
.finding-label{font-size:.87rem;font-weight:600;color:var(--text2);margin-bottom:2px}
.finding-section{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.finding-note{font-size:.77rem;color:var(--muted);margin-top:4px;font-style:italic}
.finding-cost{margin-left:auto;text-align:right;flex-shrink:0}
.finding-cost-val{font-family:var(--fm);font-size:.82rem;font-weight:700;color:var(--accent)}
.finding-cost-lbl{font-family:var(--fm);font-size:.55rem;color:var(--soft)}

.cost-summary{background:rgba(20,184,166,.04);border:1px solid rgba(20,184,166,.18);border-radius:12px;padding:20px 24px;margin-bottom:24px}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cost-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px;font-weight:700;font-size:1rem}
.cost-row span:first-child{color:var(--muted);font-size:.84rem}
.cost-row span:last-child{color:var(--accent);font-weight:600;font-family:var(--fm);font-size:.85rem}
.cost-row:last-child span{color:var(--text2)}

.prio-section{margin-bottom:22px}
.prio-title{font-family:var(--fm);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prio-title.k{color:var(--danger)}.prio-title.m{color:var(--warn)}

.print-btn{background:rgba(15,23,42,.8);color:var(--text);border:1px solid var(--border2);border-radius:var(--rpill);padding:10px 20px;font-size:.84rem;font-family:var(--ff);cursor:pointer;transition:.2s;font-weight:500}
.print-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── COMPLIANCE GAUGE ── */
.gauge-container{display:flex;justify-content:center;margin:20px 0}
.gauge-wrap{position:relative;width:180px;height:100px}
.gauge-svg{width:180px;height:100px}
.gauge-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);text-align:center}
.gauge-val{font-family:var(--fh);font-size:1.8rem;font-weight:800;color:var(--text2)}
.gauge-sublabel{font-family:var(--fm);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}

/* ── RESPONSIVE ── */
@media(max-width:900px){.module-cards{grid-template-columns:1fr}.report-kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){
  .hdr{padding:10px 16px}.wrap{padding:16px 14px 60px}.meta-grid{grid-template-columns:1fr}
  .report-kpis{grid-template-columns:1fr 1fr}.panel{padding:20px 16px}
  .ci-btns{gap:3px}.ci-btn{padding:4px 8px;font-size:.64rem}
}

/* ── PRINT ── */
@media print{
  .hdr,.stepper,.progress-bar,.nav-row,.print-btn,.mc-check{display:none!important}
  body{background:#fff;color:#111}
  body::before{display:none}
  .panel,.report-header,.finding,.kpi,.cost-summary,.check-item{background:#fff!important;border-color:#ddd!important;box-shadow:none!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .panel-title,.report-title,.finding-label,.kpi-val,.ci-label{color:#111!important}
  .norm-badge,.module-indicator{border-color:#999!important}
}

/* ── ANIMATIONS ── */

// ═══ STATE ═══
let state = {
  currentStep: 0,
  selectedModule: null, // 'security','qm','combined'
  selectedNorms: [],
  meta: {objekt:'',adresse:'',datum:'',pruefer:'',auftraggeber:'',anlass:'',typ:'',notizen:''},
  findings: {}
};

function getActiveChecks() {
  if (!state.selectedModule) return [];
  if (state.selectedModule === 'combined') return CHECKS;
  return CHECKS.filter(c => c.module === state.selectedModule);
}

function getSteps() {
  const steps = [{id:'module',label:'Modul'},{id:'norms',label:'Normen'},{id:'meta',label:'Objektdaten'}];
  getActiveChecks().forEach(c => steps.push({id:c.id, label:c.label}));
  steps.push({id:'report',label:'Bericht'});
  return steps;
}

// ═══ RENDER ENGINE ═══
function render() {
  const steps = getSteps();
  renderStepper(steps);
  renderProgress(steps);
  const step = steps[state.currentStep];
  if (!step) return;

  if (step.id === 'module') renderModuleSelection();
  else if (step.id === 'norms') renderNormSelection();
  else if (step.id === 'meta') renderMeta();
  else if (step.id === 'report') renderReport();
  else {
    const check = CHECKS.find(c => c.id === step.id);
    if (check) renderChecklist(check);
  }
  updateHeaderBadge();
}

function renderStepper(steps) {
  const el = document.getElementById('stepper');
  el.innerHTML = steps.map((s,i) => {
    const isDone = i < state.currentStep;
    const isActive = i === state.currentStep;
    return `<div class="step">
      <button class="step-btn ${isActive?'active':''} ${isDone?'done':''}" onclick="goTo(${i})">
        <span class="step-num">${isDone?'✓':(i+1)}</span>
        <span class="step-label">${s.label}</span>
      </button><div class="step-line"></div>
    </div>`;
  }).join('');
}

function renderProgress(steps) {
  const pct = Math.round((state.currentStep / Math.max(steps.length-1,1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateHeaderBadge() {
  const b = document.getElementById('hdrBadge');
  if (!state.selectedModule) { b.textContent = 'Modul wählen'; b.style.color='var(--orange)'; b.style.borderColor='rgba(249,115,22,.2)'; b.style.background='var(--orangeDim)'; return; }
  const labels = {security:'🛡️ Security Audit',qm:'📋 QM Audit',combined:'🔄 Kombiniertes Audit'};
  b.textContent = labels[state.selectedModule] || '';
  if (state.selectedModule==='security'){b.style.color='var(--accent)';b.style.borderColor='rgba(20,184,166,.2)';b.style.background='var(--accentDim)';}
  else if (state.selectedModule==='qm'){b.style.color='var(--orange)';b.style.borderColor='rgba(249,115,22,.2)';b.style.background='var(--orangeDim)';}
  else{b.style.color='var(--purple)';b.style.borderColor='rgba(167,139,250,.2)';b.style.background='var(--purpleDim)';}
}

function selectModule(m) {
  state.selectedModule = m;
  // auto-select relevant norms
  if (m === 'security') state.selectedNorms = Object.keys(NORM_DEFS).filter(n => NORM_DEFS[n].module === 'security');
  else if (m === 'qm') state.selectedNorms = Object.keys(NORM_DEFS).filter(n => NORM_DEFS[n].module === 'qm');
  else state.selectedNorms = Object.keys(NORM_DEFS);
  render();
}

// ── NORM SELECTION ──
function renderNormSelection() {
  const secNorms = Object.entries(NORM_DEFS).filter(([,v]) => v.module === 'security');
  const qmNorms = Object.entries(NORM_DEFS).filter(([,v]) => v.module === 'qm');

  const showSec = state.selectedModule === 'security' || state.selectedModule === 'combined';
  const showQm = state.selectedModule === 'qm' || state.selectedModule === 'combined';

  let normsHtml = '';
  if (showSec) {
    normsHtml += `<div class="norm-group"><div class="norm-group-title sec">🛡️ Security-Normen</div><div class="norm-chips">`;
    secNorms.forEach(([key]) => {
      normsHtml += `<div class="norm-chip ${state.selectedNorms.includes(key)?'active':''}" onclick="toggleNorm('${key}')">${key}</div>`;
    });
    normsHtml += `</div></div>`;
  }
  if (showQm) {
    normsHtml += `<div class="norm-group"><div class="norm-group-title qm">📋 QM-Normen</div><div class="norm-chips">`;
    qmNorms.forEach(([key]) => {
      normsHtml += `<div class="norm-chip qm-chip ${state.selectedNorms.includes(key)?'active':''}" onclick="toggleNorm('${key}')">${key}</div>`;
    });
    normsHtml += `</div></div>`;
  }

  // Norm details (expandable)
  let detailsHtml = '';
  state.selectedNorms.forEach(nk => {
    const nd = NORM_DEFS[nk];
    if (!nd) return;
    const isQm = nd.module === 'qm';
    detailsHtml += `<div class="norm-details">
      <div class="nd-header" onclick="toggleNormDetail(this)">
        <div><span class="nd-title">${nd.fullName}</span><br><span style="font-size:.75rem;color:var(--muted)">${nd.desc}</span></div>
        <span class="nd-arrow">▼</span>
      </div>
      <div class="nd-body"><div class="nd-content">
        ${nd.reqs.map(r => `<div class="nd-req ${isQm?'qm-req':''}"><span class="nd-req-num">${r.num}</span><span>${r.text}</span></div>`).join('')}
      </div></div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="panel-title">Normen & Standards auswählen</div>
    <p class="panel-sub">Wählen Sie die zu prüfenden Normen. Klicken Sie auf eine Norm, um deren Anforderungen einzusehen. Alle ausgewählten Normen fließen in den Bedarfsbericht ein.</p>
    <div class="norm-selector">${normsHtml}</div>
    <div class="section-divider"></div>
    <div style="font-family:var(--fm);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:12px">Anforderungen der ausgewählten Normen – zum Aufklappen anklicken</div>
    ${detailsHtml}
    <div class="nav-row">
      <button class="btn-secondary" onclick="prev()">← Zurück</button>
      <button class="btn-primary" onclick="next()">Weiter zu Objektdaten →</button>
    </div>
  </div>`;
}

function toggleNorm(key) {
  const idx = state.selectedNorms.indexOf(key);
  if (idx > -1) state.selectedNorms.splice(idx, 1);
  else state.selectedNorms.push(key);
  render();
}

function toggleNormDetail(el) {
  el.classList.toggle('open');
  const body = el.nextElementSibling;
  body.classList.toggle('open');
}

          <div class="ci-label">${item.label} <span class="module-indicator ${item.module==='qm'?'qm':'sec'}">${item.module==='qm'?'QM':'SEC'}</span></div>
          <div class="ci-norm ${itemModClass}">${item.norm}</div>
          <div class="ci-desc">${item.desc}</div>
        </div>
        <div class="ci-btns">
          <button class="ci-btn ok ${s==='ok'?'active':''}" onclick="setStatus('${item.id}','ok')">✓ OK</button>
          <button class="ci-btn mangel ${s==='mangel'?'active':''}" onclick="setStatus('${item.id}','mangel')">⚠ Mangel</button>
          <button class="ci-btn kritisch ${s==='kritisch'?'active':''}" onclick="setStatus('${item.id}','kritisch')">✕ Kritisch</button>
          <button class="ci-btn na ${s==='na'?'active':''}" onclick="setStatus('${item.id}','na')">– N/A</button>
        </div>
      </div>
      <div class="ci-note ${s&&s!=='ok'&&s!=='na'?'show':''}" id="note_${item.id}">
        <input type="text" placeholder="Notiz / Beobachtung..." value="${esc(f.note||'')}" oninput="setNote('${item.id}',this.value)">
      </div>
    </div>`;
  }).join('');

  const done = check.items.filter(i => state.findings[i.id]?.status).length;
  const total = check.items.length;
  const normBadges = check.norms.map(n => {
    const nd = NORM_DEFS[n];
    const cls = nd?.module === 'qm' ? 'qm' : 'security';
    return `<span class="norm-badge ${cls}">${n}</span>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div>${normBadges}</div>
    <div class="panel-title">${check.icon} ${check.label}</div>
    <p class="panel-sub">${check.sub} <strong style="color:var(--accent)">${done}/${total}</strong> bewertet.</p>
    <div class="check-section">
      <div class="check-section-title ${check.module==='qm'?'qm-section':''}">Prüfpunkte</div>
      ${items}
    </div>
    <div class="nav-row">
      <button class="btn-secondary" onclick="prev()">← Zurück</button>
      <button class="btn-primary" onclick="next()">Weiter →</button>
    </div>
  </div>`;
}

// ── REPORT ──
function renderReport() {
  const activeChecks = getActiveChecks();
  let kritisch=[], mangel=[], ok=0, na=0, notAssessed=0;
  let costMin=0, costMax=0;

  activeChecks.forEach(check => {
    check.items.forEach(item => {
      const f = state.findings[item.id];
      const s = f?.status;
      if (s==='ok') ok++;
      else if (s==='na') na++;
      else if (s==='kritisch') {
        kritisch.push({...item, note:f?.note||'', section:check.label, icon:check.icon});
        const [mn,mx] = parseCost(item.costs.kritisch);
        costMin+=mn; costMax+=mx;
      } else if (s==='mangel') {
        mangel.push({...item, note:f?.note||'', section:check.label, icon:check.icon});
        const [mn,mx] = parseCost(item.costs.mangel);
        costMin+=mn; costMax+=mx;
      } else notAssessed++;
    });
  });

  const totalItems = kritisch.length + mangel.length + ok + na + notAssessed;
  const assessed = kritisch.length + mangel.length + ok;
  const compliancePct = assessed > 0 ? Math.round((ok / assessed) * 100) : 0;

  let riskLevel, riskClass;
  if (kritisch.length >= 5 || (kritisch.length >= 3 && mangel.length >= 4)) {riskLevel='Kritisch';riskClass='kritisch';}
  else if (kritisch.length >= 2 || mangel.length >= 6) {riskLevel='Hoch';riskClass='hoch';}
  else if (kritisch.length >= 1 || mangel.length >= 3) {riskLevel='Mittel';riskClass='mittel';}
  else {riskLevel='Gering';riskClass='gering';}

  const datumStr = state.meta.datum ? new Date(state.meta.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}) : '–';
  const modLabel = {security:'Security Audit',qm:'QM Audit',combined:'Kombiniertes Security + QM Audit'}[state.selectedModule]||'';

  // Gauge SVG
  const gaugeAngle = (compliancePct / 100) * 180;
  const gaugeColor = compliancePct >= 80 ? '#22c55e' : compliancePct >= 50 ? '#eab308' : '#ef4444';

  const findingRow = (f, prio) => `
    <div class="finding ${prio}">
      <div class="finding-icon">${f.icon}</div>
      <div class="finding-body">
        <div class="finding-label">${f.label} <span class="module-indicator ${f.module==='qm'?'qm':'sec'}">${f.module==='qm'?'QM':'SEC'}</span></div>
        <div class="finding-section">${f.section} · <span style="font-family:var(--fm);font-size:.58rem">${f.norm}</span></div>
        ${f.note ? `<div class="finding-note">"${esc(f.note)}"</div>` : ''}
      </div>
      <div class="finding-cost">
        <div class="finding-cost-val">€ ${f.costs[prio]}</div>
        <div class="finding-cost-lbl">Schätzung</div>
      </div>
    </div>`;

  // Norms list for report
  const normsList = state.selectedNorms.map(n => {
    const nd = NORM_DEFS[n];
    return nd ? `<span class="norm-badge ${nd.module==='qm'?'qm':'security'}">${nd.fullName}</span>` : '';
  }).join(' ');

  document.getElementById('mainContent').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div style="font-size:.74rem;color:var(--muted)">Bericht erstellt: ${new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    <div style="display:flex;gap:8px">
      <button class="print-btn" onclick="window.print()">🖨 Drucken / PDF</button>
    </div>
  </div>

  <div class="report-header">
    <div style="font-family:var(--fm);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">SecureStay: Analytics · ${modLabel}</div>
    <div class="report-title">${esc(state.meta.objekt)||'Objekt (ohne Bezeichnung)'}</div>
    <div class="report-meta">
      ${state.meta.auftraggeber?`<strong style="color:var(--text2)">${esc(state.meta.auftraggeber)}</strong> · `:''}
      ${state.meta.adresse?`${esc(state.meta.adresse)} · `:''}
      Begehung: ${datumStr}
      ${state.meta.pruefer?` · Auditor: <strong style="color:var(--text2)">${esc(state.meta.pruefer)}</strong>`:''}
      ${state.meta.anlass?` · ${esc(state.meta.anlass)}`:''}
      ${state.meta.typ?` · ${esc(state.meta.typ)}`:''}
    </div>
    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:4px">${normsList}</div>
  </div>

  <div class="report-kpis">
    <div class="kpi danger"><div class="kpi-val">${kritisch.length}</div><div class="kpi-lbl">Kritisch</div></div>
    <div class="kpi warn"><div class="kpi-val">${mangel.length}</div><div class="kpi-lbl">Mängel</div></div>
    <div class="kpi ok"><div class="kpi-val">${ok}</div><div class="kpi-lbl">Bestanden</div></div>
    <div class="kpi total"><div class="kpi-val">${assessed}</div><div class="kpi-lbl">Bewertet</div></div>
    <div class="kpi purple"><div class="kpi-val">${compliancePct}%</div><div class="kpi-lbl">Compliance</div></div>
  </div>

  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:24px">
    <div class="risk-level ${riskClass}"><span>●</span> Gesamtrisiko: <strong>${riskLevel}</strong></div>
    <div class="gauge-container">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 180 100">
          <path d="M 10 90 A 80 80 0 0 1 170 90" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round"/>
          <path d="M 10 90 A 80 80 0 0 1 170 90" fill="none" stroke="${gaugeColor}" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${gaugeAngle * Math.PI * 80 / 180} 999" opacity=".9"/>
        </svg>
        <div class="gauge-label">
          <div class="gauge-val">${compliancePct}%</div>
          <div class="gauge-sublabel">Compliance-Rate</div>
        </div>
      </div>
    </div>
  </div>

  ${kritisch.length>0?`<div class="prio-section"><div class="prio-title k">✕ Kritische Mängel – sofortiger Handlungsbedarf (${kritisch.length})</div>${kritisch.map(f=>findingRow(f,'kritisch')).join('')}</div>`:''}
  ${mangel.length>0?`<div class="prio-section"><div class="prio-title m">⚠ Mängel – mittelfristiger Handlungsbedarf (${mangel.length})</div>${mangel.map(f=>findingRow(f,'mangel')).join('')}</div>`:''}

  ${kritisch.length===0&&mangel.length===0?`
  <div style="background:var(--okDim);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:28px;text-align:center;margin-bottom:24px">
    <div style="font-size:2rem;margin-bottom:8px">✅</div>
    <div style="font-size:1rem;font-weight:700;color:#4ade80;margin-bottom:6px">Keine Mängel festgestellt</div>
    <div style="font-size:.84rem;color:var(--muted)">Alle bewerteten Prüfpunkte wurden als konform eingestuft.</div>
  </div>`:''}

  <div class="cost-summary">
    <div style="font-family:var(--fm);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px">Investitionsbedarf (Kostenschätzung)</div>
    <div class="cost-row"><span>Sofortmaßnahmen (kritisch)</span><span>€ ${fmtCostArr(kritisch,'kritisch')}</span></div>
    <div class="cost-row"><span>Mittelfristige Maßnahmen</span><span>€ ${fmtCostArr(mangel,'mangel')}</span></div>
    <div class="cost-row"><span>Gesamtinvestitionsbedarf</span><span>€ ${costMin.toLocaleString('de-DE')} – ${costMax.toLocaleString('de-DE')}</span></div>
    <div style="font-size:.7rem;color:var(--soft);margin-top:10px">* Schätzungen basierend auf Markterfahrung. Detailkalkulation nach Fachfirmen-Angebot.</div>
  </div>

  ${state.meta.notizen?`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:24px">
    <div style="font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">Notizen</div>
    <div style="font-size:.86rem;color:var(--muted);line-height:1.7">${esc(state.meta.notizen)}</div>
  </div>`:''}

  <div style="background:linear-gradient(135deg,rgba(20,184,166,.04),rgba(249,115,22,.03));border:1px solid rgba(20,184,166,.15);border-radius:12px;padding:22px;text-align:center">
    <div style="font-size:.7rem;color:var(--soft);margin-bottom:5px">Erstellt mit</div>
    <div style="font-family:var(--fh);font-weight:700;color:var(--text2);font-size:1rem">SecureStay: Analytics</div>
    <div style="font-size:.82rem;color:var(--muted);margin-top:4px">SecureStay Solutions UG (haftungsbeschränkt)</div>
    <div style="font-size:.76rem;color:var(--soft);margin-top:2px">Kirchstr. 8b · 55270 Essenheim · securestay@outlook.de · +49 174 6703741</div>
  </div>

  <div class="nav-row">
    <button class="btn-secondary" onclick="prev()">← Zurück zur Begehung</button>
    <button class="btn-primary" onclick="window.print()">🖨 Bericht drucken / als PDF</button>
  </div>`;
}

// ═══ HELPERS ═══
function parseCost(str) {
  if (!str) return [0,0];
  const parts = str.replace(/\./g,'').split('–').map(x => parseInt(x.replace(/\D/g,'')) || 0);
  return [parts[0]||0, parts[1]||parts[0]||0];
}

function fmtCostArr(items, prio) {
  let mn=0,mx=0;
  items.forEach(f => { const [a,b]=parseCost(f.costs[prio]); mn+=a; mx+=b; });
  if (mn===0&&mx===0) return '0';
  return `${mn.toLocaleString('de-DE')} – ${mx.toLocaleString('de-DE')}`;
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(id, status) {
  if (!state.findings[id]) state.findings[id] = {status:'',note:''};
  state.findings[id].status = status;
  const ci = document.getElementById('ci_'+id);
  if (!ci) return;
  ci.className = 'check-item status-'+status;
  ci.querySelectorAll('.ci-btn').forEach(b => b.classList.toggle('active', b.classList.contains(status)));
  const noteEl = document.getElementById('note_'+id);
  if (noteEl) noteEl.classList.toggle('show', status==='mangel'||status==='kritisch');
  updateCounter();
}

function setNote(id, val) {
  if (!state.findings[id]) state.findings[id] = {status:'',note:''};
  state.findings[id].note = val;
}

function updateCounter() {
  const steps = getSteps();
  const step = steps[state.currentStep];
  const check = CHECKS.find(c => c.id === step?.id);
  if (!check) return;
  const done = check.items.filter(i => state.findings[i.id]?.status).length;
  const sub = document.querySelector('.panel-sub');
  if (sub) sub.innerHTML = sub.innerHTML.replace(/<strong[^>]*>\d+\/\d+<\/strong>/, `<strong style="color:var(--accent)">${done}/${check.items.length}</strong>`);
}

function goTo(i) { state.currentStep=i; render(); scrollTo(0,0); }
function next() { const steps=getSteps(); if(state.currentStep<steps.length-1){state.currentStep++;render();scrollTo(0,0);} }
function prev() { if(state.currentStep>0){state.currentStep--;render();scrollTo(0,0);} }

// ═══ INIT ═══
render();
</script>
</body>
</html>
