<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SecureStay: Analytics – Audit & Compliance Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--bg2:#0a1628;--bg3:#0f1f3d;--bg4:#111b2e;
  --surface:rgba(10,22,40,.7);--surface2:rgba(15,30,56,.6);--surface3:rgba(8,18,35,.85);
  --border:#1e293b;--border2:#334155;--border3:rgba(148,163,184,.12);
  --text:#e2e8f0;--text2:#f8fafc;--muted:#94a3b8;--soft:#64748b;--dim:#475569;
  --accent:#14b8a6;--accent2:#2dd4bf;--accent3:#99f6e4;--accentDim:rgba(20,184,166,.12);
  --orange:#f97316;--orange2:#fb923c;--orangeDim:rgba(249,115,22,.12);
  --warn:#eab308;--warnDim:rgba(234,179,8,.1);
  --danger:#ef4444;--dangerDim:rgba(239,68,68,.08);
  --ok:#22c55e;--okDim:rgba(34,197,94,.08);
  --na:#64748b;
  --purple:#a78bfa;--purpleDim:rgba(167,139,250,.1);
  --blue:#3b82f6;--blueDim:rgba(59,130,246,.1);
  --r:12px;--r2:16px;--rpill:999px;
  --sh:0 20px 48px rgba(0,0,0,.7);--sh2:0 4px 16px rgba(0,0,0,.4);
  --ff:'DM Sans',system-ui,sans-serif;
  --fh:'Outfit',system-ui,sans-serif;
  --fm:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(20,184,166,.04) 0,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(249,115,22,.03) 0,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;background:rgba(2,6,23,.94);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;backdrop-filter:blur(16px) saturate(1.4)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,rgba(20,184,166,.15),rgba(249,115,22,.1));border:1px solid rgba(20,184,166,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:.95rem;color:var(--text2);position:relative;overflow:hidden}
.logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.06));pointer-events:none}
.logo-mark span{color:var(--accent)}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-family:var(--fh);font-weight:700;font-size:.92rem;letter-spacing:.04em;color:var(--text2)}
.logo-sub{font-family:var(--fm);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.8}

/* ── TOP NAV TABS ── */
.top-nav{display:flex;align-items:center;gap:4px;background:rgba(15,23,42,.6);border-radius:var(--rpill);padding:3px;border:1px solid var(--border)}
.top-nav-btn{padding:7px 18px;border-radius:var(--rpill);border:none;background:transparent;color:var(--muted);font-family:var(--ff);font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.top-nav-btn:hover{color:var(--text)}
.top-nav-btn.active{background:var(--accentDim);color:var(--accent);border:1px solid rgba(20,184,166,.25)}
.top-nav-btn.active.db{background:var(--orangeDim);color:var(--orange);border-color:rgba(249,115,22,.25)}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-badge{font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:var(--rpill);border:1px solid rgba(20,184,166,.2);color:var(--accent);background:var(--accentDim)}

/* ── LAYOUT ── */
.wrap{max-width:1200px;margin:0 auto;padding:24px 24px 100px;position:relative;z-index:1}

/* ── PROGRESS ── */
.progress-bar{height:3px;background:var(--border);border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--orange));border-radius:3px;transition:.5s cubic-bezier(.4,0,.2,1)}

/* ── STEPPER ── */
.stepper{display:flex;gap:0;margin-bottom:32px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.step{display:flex;align-items:center;gap:0;flex-shrink:0}
.step-btn{display:flex;align-items:center;gap:7px;padding:7px 10px;background:none;border:none;cursor:pointer;border-radius:var(--r);transition:.2s}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.6rem;font-weight:700;border:2px solid var(--border2);color:var(--soft);background:var(--bg2);transition:.2s;flex-shrink:0}
.step-label{font-family:var(--ff);font-size:.68rem;color:var(--muted);white-space:nowrap;transition:.2s;font-weight:500}
.step-btn:hover{background:rgba(255,255,255,.02)}
.step-btn:hover .step-label{color:var(--text)}
.step-btn.active .step-num{border-color:var(--accent);background:var(--accentDim);color:var(--accent)}
.step-btn.active .step-label{color:var(--accent);font-weight:600}
.step-btn.done .step-num{border-color:var(--ok);background:var(--okDim);color:var(--ok)}
.step-btn.done .step-label{color:var(--ok)}
.step-line{width:16px;height:2px;background:var(--border);flex-shrink:0}
.step:last-child .step-line{display:none}

/* ── PANEL ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px 32px;box-shadow:var(--sh);backdrop-filter:blur(6px);animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.panel-title{font-family:var(--fh);font-size:1.35rem;font-weight:800;color:var(--text2);margin-bottom:4px;letter-spacing:-.01em}
.panel-sub{font-size:.84rem;color:var(--muted);margin-bottom:22px;line-height:1.65}
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:24px 0}

/* ── BADGES ── */
.norm-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:2px 9px;border-radius:var(--rpill);margin-bottom:4px;margin-right:4px}
.norm-badge.security{color:var(--accent);background:var(--accentDim);border:1px solid rgba(20,184,166,.18)}
.norm-badge.qm{color:var(--orange);background:var(--orangeDim);border:1px solid rgba(249,115,22,.18)}
.norm-badge.combined{color:var(--purple);background:var(--purpleDim);border:1px solid rgba(167,139,250,.18)}
.module-indicator{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;padding:1px 7px;border-radius:var(--rpill)}
.module-indicator.sec{color:var(--accent);background:var(--accentDim);border:1px solid rgba(20,184,166,.12)}
.module-indicator.qm{color:var(--orange);background:var(--orangeDim);border:1px solid rgba(249,115,22,.12)}

/* ── FORMS ── */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.fg input,.fg select,.fg textarea{background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.85rem;font-family:var(--ff);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
.fg select option{background:#0f172a}
.fg textarea{resize:vertical;min-height:70px}
.fg-full{grid-column:1/-1}

/* ── MODULE CARDS ── */
.module-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.module-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r2);padding:22px 18px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:.25s}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--sh2)}
.module-card.selected{border-color:var(--accent);background:rgba(20,184,166,.04)}
.module-card.selected::before{opacity:1}
.module-card.selected.sec::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.module-card.selected.qm::before{background:linear-gradient(90deg,var(--orange),var(--orange2))}
.module-card.selected.combo::before{background:linear-gradient(90deg,var(--accent),var(--purple),var(--orange))}
.mc-icon{font-size:1.8rem;margin-bottom:10px}
.mc-title{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:3px}
.mc-desc{font-size:.76rem;color:var(--muted);line-height:1.5}
.mc-norms{margin-top:10px;display:flex;flex-wrap:wrap;gap:3px}
.mc-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:transparent;transition:.2s}
.module-card.selected .mc-check{border-color:var(--ok);color:var(--ok);background:var(--okDim)}

/* ── NORM SELECTOR ── */
.norm-group{margin-bottom:14px}
.norm-group-title{font-family:var(--fm);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.norm-group-title.sec{color:var(--accent)}.norm-group-title.qm{color:var(--orange)}
.norm-chips{display:flex;flex-wrap:wrap;gap:5px}
.norm-chip{padding:6px 13px;border-radius:var(--rpill);border:1px solid var(--border);background:var(--bg2);font-size:.74rem;color:var(--muted);cursor:pointer;transition:.2s;font-weight:500;user-select:none}
.norm-chip:hover{border-color:var(--border2);color:var(--text)}
.norm-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accentDim)}
.norm-chip.active.qm-chip{border-color:var(--orange);color:var(--orange);background:var(--orangeDim)}

/* ── NORM DETAILS DROPDOWN ── */
.norm-details{margin-top:14px;background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.nd-header{padding:11px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.nd-header:hover{background:rgba(255,255,255,.02)}
.nd-title{font-size:.8rem;font-weight:600;color:var(--text2)}
.nd-arrow{font-size:.65rem;color:var(--soft);transition:.2s}
.nd-header.open .nd-arrow{transform:rotate(180deg)}
.nd-body{max-height:0;overflow:hidden;transition:.3s ease}
.nd-body.open{max-height:3000px}
.nd-content{padding:0 14px 14px}
.nd-req{padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem;color:var(--muted);display:flex;gap:8px;align-items:flex-start}
.nd-req:last-child{border-bottom:none}
.nd-req-num{font-family:var(--fm);font-size:.62rem;color:var(--accent);min-width:34px;flex-shrink:0;padding-top:1px}
.nd-req.qm-req .nd-req-num{color:var(--orange)}

/* ── CHECK ITEMS ── */
.check-section-title{font-family:var(--fm);font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.check-section-title.qm-section{color:var(--orange)}
.check-item{background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;transition:.2s}
.check-item:hover{border-color:var(--border2)}
.check-item.status-ok{border-left:3px solid var(--ok)}
.check-item.status-mangel{border-left:3px solid var(--warn)}
.check-item.status-kritisch{border-left:3px solid var(--danger)}
.check-item.status-na{border-left:3px solid var(--na);opacity:.5}
.ci-top{display:flex;align-items:flex-start;gap:10px}
.ci-text{flex:1;min-width:0}
.ci-label{font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ci-norm{font-family:var(--fm);font-size:.55rem;color:var(--accent);letter-spacing:.05em}
.ci-norm.qm{color:var(--orange)}
.ci-desc{font-size:.75rem;color:var(--muted);margin-top:2px;line-height:1.5}
.ci-doc-link{margin-top:6px;display:flex;align-items:center;gap:5px;font-size:.7rem}
.ci-doc-link a{color:var(--accent);text-decoration:none;font-weight:500}
.ci-doc-link a:hover{text-decoration:underline}
.ci-doc-link .doc-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ci-doc-link .doc-status.green{background:var(--ok)}.ci-doc-link .doc-status.yellow{background:var(--warn)}.ci-doc-link .doc-status.red{background:var(--danger)}.ci-doc-link .doc-status.gray{background:var(--na)}
.ci-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.ci-btn{padding:4px 10px;border-radius:var(--rpill);border:1px solid transparent;font-size:.68rem;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap;font-family:var(--ff)}
.ci-btn.ok{border-color:rgba(34,197,94,.25);color:#86efac;background:rgba(34,197,94,.06)}
.ci-btn.ok.active{background:rgba(34,197,94,.18);border-color:#22c55e;color:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.2)}
.ci-btn.mangel{border-color:rgba(234,179,8,.25);color:#fde047;background:rgba(234,179,8,.06)}
.ci-btn.mangel.active{background:rgba(234,179,8,.18);border-color:#eab308;color:#eab308;box-shadow:0 0 8px rgba(234,179,8,.2)}
.ci-btn.kritisch{border-color:rgba(239,68,68,.25);color:#fca5a5;background:rgba(239,68,68,.06)}
.ci-btn.kritisch.active{background:rgba(239,68,68,.18);border-color:#ef4444;color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.2)}
.ci-btn.na{border-color:rgba(100,116,139,.25);color:var(--muted);background:transparent}
.ci-btn.na.active{background:rgba(100,116,139,.15);border-color:var(--na)}
.ci-note{margin-top:8px;display:none}
.ci-note.show{display:block}
.ci-note input{width:100%;background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.78rem;font-family:var(--ff);outline:none}
.ci-note input:focus{border-color:var(--accent2)}

/* ── BUTTONS ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0d9488);color:#0f172a;border:none;border-radius:var(--rpill);padding:10px 24px;font-size:.86rem;font-weight:700;font-family:var(--ff);cursor:pointer;display:inline-flex;align-items:center;gap:6px;box-shadow:0 8px 24px rgba(20,184,166,.35);transition:.2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(20,184,166,.4)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--rpill);padding:10px 18px;font-size:.84rem;font-weight:500;font-family:var(--ff);cursor:pointer;transition:.2s}
.btn-secondary:hover{border-color:var(--border2);background:rgba(15,23,42,.6)}
.btn-sm{padding:6px 14px;font-size:.76rem;border-radius:var(--rpill);border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--ff);cursor:pointer;transition:.15s;font-weight:500}
.btn-sm:hover{border-color:var(--border2);background:rgba(20,184,166,.06)}
.btn-sm.accent{border-color:rgba(20,184,166,.3);color:var(--accent);background:var(--accentDim)}
.btn-sm.danger{border-color:rgba(239,68,68,.3);color:#fca5a5;background:var(--dangerDim)}

/* ══════════════════════════════════════
   DATABASE SECTION
   ══════════════════════════════════════ */

/* ── DB TABS ── */
.db-tabs{display:flex;gap:3px;margin-bottom:24px;background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:var(--rpill);padding:3px;width:fit-content}
.db-tab{padding:7px 16px;border-radius:var(--rpill);border:none;background:transparent;color:var(--muted);font-family:var(--ff);font-size:.78rem;font-weight:500;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.db-tab:hover{color:var(--text)}
.db-tab.active{background:var(--orangeDim);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.db-tab .count{font-family:var(--fm);font-size:.6rem;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:var(--rpill);margin-left:2px}

/* ── DB STATS ── */
.db-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.db-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.db-stat-val{font-family:var(--fh);font-size:1.6rem;font-weight:800;line-height:1;margin-bottom:3px}
.db-stat-lbl{font-family:var(--fm);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
.db-stat.green .db-stat-val{color:var(--ok)}
.db-stat.yellow .db-stat-val{color:var(--warn)}
.db-stat.red .db-stat-val{color:var(--danger)}
.db-stat.total .db-stat-val{color:var(--orange)}

/* ── DB SEARCH ── */
.db-search{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.db-search input{flex:1;min-width:200px;background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:var(--rpill);padding:9px 16px;color:var(--text);font-size:.84rem;font-family:var(--ff);outline:none;transition:.2s}
.db-search input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(20,184,166,.08)}
.db-search select{background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:var(--rpill);padding:9px 14px;color:var(--text);font-size:.82rem;font-family:var(--ff);outline:none;cursor:pointer}
.db-search select option{background:#0f172a}

/* ── DOC CARDS ── */
.doc-grid{display:grid;grid-template-columns:1fr;gap:8px}
.doc-card{background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:.2s}
.doc-card:hover{border-color:var(--border2);background:rgba(15,23,42,.7)}
.doc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--surface2);border:1px solid var(--border)}
.doc-body{flex:1;min-width:0}
.doc-name{font-size:.88rem;font-weight:600;color:var(--text2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:.72rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.doc-meta span{display:flex;align-items:center;gap:3px}
.doc-norms{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.doc-status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rpill);font-family:var(--fm);font-size:.58rem;font-weight:600;letter-spacing:.04em}
.doc-status-pill.green{color:var(--ok);background:var(--okDim);border:1px solid rgba(34,197,94,.2)}
.doc-status-pill.yellow{color:var(--warn);background:var(--warnDim);border:1px solid rgba(234,179,8,.2)}
.doc-status-pill.red{color:var(--danger);background:var(--dangerDim);border:1px solid rgba(239,68,68,.2)}
.doc-status-pill.gray{color:var(--na);background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2)}
.doc-actions{display:flex;gap:5px;flex-shrink:0}

/* ── ADD DOC MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,6,23,.8);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r2);padding:28px 30px;max-width:640px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,.7);animation:fadeUp .25s ease}
.modal-title{font-family:var(--fh);font-size:1.15rem;font-weight:800;color:var(--text2);margin-bottom:4px}
.modal-sub{font-size:.82rem;color:var(--muted);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}

/* ── COMPLIANCE VIEW ── */
.compliance-norm{background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.compliance-norm-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s}
.compliance-norm-header:hover{background:rgba(255,255,255,.02)}
.cn-left{display:flex;align-items:center;gap:10px}
.cn-name{font-size:.88rem;font-weight:600;color:var(--text2)}
.cn-bar{flex:1;height:6px;background:var(--border);border-radius:3px;min-width:80px;max-width:160px;overflow:hidden}
.cn-bar-fill{height:100%;border-radius:3px;transition:.4s}
.cn-pct{font-family:var(--fm);font-size:.72rem;font-weight:600;min-width:36px;text-align:right}
.cn-arrow{color:var(--soft);font-size:.6rem;transition:.2s}
.compliance-norm-header.open .cn-arrow{transform:rotate(180deg)}
.cn-body{max-height:0;overflow:hidden;transition:.3s ease}
.cn-body.open{max-height:5000px}
.cn-body-inner{padding:0 16px 14px}
.cn-req-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.cn-req-row:last-child{border-bottom:none}
.cn-req-num{font-family:var(--fm);font-size:.6rem;color:var(--soft);min-width:40px}
.cn-req-text{flex:1;color:var(--muted)}
.cn-req-docs{display:flex;gap:4px;flex-wrap:wrap}

/* ── REPORT ── */
.report-header{background:linear-gradient(135deg,rgba(20,184,166,.08),rgba(249,115,22,.05),rgba(15,23,42,.9));border:1px solid rgba(20,184,166,.25);border-radius:var(--r2);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.report-header::before{content:'';position:absolute;top:-40%;right:-10%;width:280px;height:280px;background:radial-gradient(circle,rgba(20,184,166,.06),transparent 70%);pointer-events:none}
.report-title{font-family:var(--fh);font-size:1.5rem;font-weight:800;color:var(--text2);margin-bottom:5px;position:relative}
.report-meta{font-size:.8rem;color:var(--muted);line-height:1.7;position:relative}
.report-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.kpi-val{font-family:var(--fh);font-size:1.6rem;font-weight:800;line-height:1;margin-bottom:3px}
.kpi-lbl{font-family:var(--fm);font-size:.56rem;letter-spacing:.07em;text-transform:uppercase;color:var(--soft)}
.kpi.ok .kpi-val{color:var(--ok)}.kpi.warn .kpi-val{color:var(--warn)}.kpi.danger .kpi-val{color:var(--danger)}.kpi.total .kpi-val{color:var(--accent)}.kpi.purple .kpi-val{color:var(--purple)}
.risk-level{display:inline-flex;align-items:center;gap:7px;padding:7px 18px;border-radius:var(--rpill);font-size:.82rem;font-weight:700;margin-bottom:20px;font-family:var(--ff)}
.risk-level.gering{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.risk-level.mittel{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);color:#fbbf24}
.risk-level.hoch{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171}
.risk-level.kritisch{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);color:#fca5a5;animation:pulse-d 2s ease-in-out infinite}
@keyframes pulse-d{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.25)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.finding{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;display:flex;gap:12px;align-items:flex-start;transition:.15s}
.finding:hover{border-color:var(--border2)}
.finding.kritisch{border-color:rgba(239,68,68,.3);background:var(--dangerDim)}
.finding.mangel{border-color:rgba(234,179,8,.3);background:var(--warnDim)}
.finding-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.finding.kritisch .finding-icon{background:rgba(239,68,68,.12)}
.finding.mangel .finding-icon{background:rgba(234,179,8,.12)}
.finding-body{flex:1;min-width:0}
.finding-label{font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:1px}
.finding-section{font-size:.68rem;color:var(--muted)}
.finding-note{font-size:.75rem;color:var(--muted);margin-top:3px;font-style:italic}
.finding-cost{margin-left:auto;text-align:right;flex-shrink:0}
.finding-cost-val{font-family:var(--fm);font-size:.8rem;font-weight:700;color:var(--accent)}
.finding-cost-lbl{font-family:var(--fm);font-size:.5rem;color:var(--soft)}
.cost-summary{background:rgba(20,184,166,.04);border:1px solid rgba(20,184,166,.18);border-radius:12px;padding:18px 22px;margin-bottom:20px}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cost-row:last-child{border-bottom:none;padding-top:10px;margin-top:3px;font-weight:700;font-size:.95rem}
.cost-row span:first-child{color:var(--muted);font-size:.82rem}
.cost-row span:last-child{color:var(--accent);font-weight:600;font-family:var(--fm);font-size:.82rem}
.cost-row:last-child span{color:var(--text2)}
.prio-title{font-family:var(--fm);font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.prio-title.k{color:var(--danger)}.prio-title.m{color:var(--warn)}
.print-btn{background:rgba(15,23,42,.8);color:var(--text);border:1px solid var(--border2);border-radius:var(--rpill);padding:8px 18px;font-size:.82rem;font-family:var(--ff);cursor:pointer;transition:.2s;font-weight:500}
.print-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── RESPONSIVE ── */
@media(max-width:900px){.module-cards{grid-template-columns:1fr}.report-kpis{grid-template-columns:repeat(3,1fr)}.db-stats{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.hdr{padding:8px 14px;flex-wrap:wrap;gap:8px}.wrap{padding:14px 12px 60px}.meta-grid{grid-template-columns:1fr}.panel{padding:18px 14px}.ci-btns{gap:3px}.ci-btn{padding:3px 7px;font-size:.62rem}.report-kpis{grid-template-columns:1fr 1fr}.top-nav{order:10;width:100%}}

/* ── PRINT ── */
@media print{.hdr,.stepper,.progress-bar,.nav-row,.print-btn,.mc-check,.top-nav,.db-tabs,.db-search,.btn-sm,.doc-actions{display:none!important}body{background:#fff;color:#111}body::before{display:none}.panel,.report-header,.finding,.kpi,.cost-summary,.check-item,.doc-card,.compliance-norm{background:#fff!important;border-color:#ddd!important;box-shadow:none!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

</div>

// ═══ STATE ═══
let state = {
  mode:'audit', // 'audit' | 'database'
  dbTab:'all', // 'all' | 'compliance' | 'expiring'
  currentStep:0,
  selectedModule:null,
  selectedNorms:[],
  meta:{objekt:'',adresse:'',datum:'',pruefer:'',auftraggeber:'',anlass:'',typ:'',notizen:''},
  findings:{},
  documents:[], // {id,name,category,norms:[],checkpoints:[],expiry,version,owner,notes,fileName,addedAt}
  editDocId:null
};

// ── PERSISTENCE ──
function saveState(){
  try{localStorage.setItem('ssa_state',JSON.stringify(state))}catch(e){}
}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('ssa_state'));
    if(s){Object.assign(state,s);if(!state.documents)state.documents=[];if(!state.dbTab)state.dbTab='all';}
  }catch(e){}
}
loadState();

function getActiveChecks(){
  if(!state.selectedModule)return[];
  if(state.selectedModule==='combined')return CHECKS;
  return CHECKS.filter(c=>c.module===state.selectedModule);
}
function getSteps(){
  const s=[{id:'module',label:'Modul'},{id:'norms',label:'Normen'},{id:'meta',label:'Objektdaten'}];
  getActiveChecks().forEach(c=>s.push({id:c.id,label:c.label}));
  s.push({id:'report',label:'Bericht'});
  return s;
}
function getAllCheckpoints(){
  let all=[];
  CHECKS.forEach(c=>c.items.forEach(i=>all.push({id:i.id,label:i.label,section:c.label,module:c.module})));
  return all;
}

// ═══ MODE SWITCH ═══
function switchMode(m){
  state.mode=m;
  document.querySelectorAll('.top-nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.top-nav-btn').forEach(b=>{if((m==='audit'&&!b.classList.contains('db'))||(m==='database'&&b.classList.contains('db')))b.classList.add('active');});
  render();saveState();
}

// ═══ RENDER ═══
function render(){
  if(state.mode==='database'){
    document.getElementById('auditSection').style.display='none';
    renderDatabase();
  }else{
    document.getElementById('auditSection').style.display='';
    const steps=getSteps();
    renderStepper(steps);renderProgress(steps);
    const step=steps[state.currentStep];
    if(!step)return;
    if(step.id==='module')renderModuleSelection();
    else if(step.id==='norms')renderNormSelection();
    else if(step.id==='meta')renderMeta();
    else if(step.id==='report')renderReport();
    else{const c=CHECKS.find(x=>x.id===step.id);if(c)renderChecklist(c);}
  }
  updateHeaderBadge();
}

function renderStepper(steps){
  document.getElementById('stepper').innerHTML=steps.map((s,i)=>{
    const isDone=i<state.currentStep,isActive=i===state.currentStep;
    return`<div class="step"><button class="step-btn ${isActive?'active':''} ${isDone?'done':''}" onclick="goTo(${i})"><span class="step-num">${isDone?'✓':(i+1)}</span><span class="step-label">${s.label}</span></button><div class="step-line"></div></div>`;
  }).join('');
}
function renderProgress(steps){document.getElementById('progressFill').style.width=Math.round((state.currentStep/Math.max(steps.length-1,1))*100)+'%';}
function updateHeaderBadge(){
  const b=document.getElementById('hdrBadge');
  if(state.mode==='database'){b.textContent='📁 Dokumenten-Datenbank';b.style.color='var(--orange)';b.style.borderColor='rgba(249,115,22,.2)';b.style.background='var(--orangeDim)';return;}
  if(!state.selectedModule){b.textContent='Modul wählen';b.style.color='var(--accent)';b.style.borderColor='rgba(20,184,166,.2)';b.style.background='var(--accentDim)';return;}
  const labels={security:'🛡️ Security',qm:'📋 QM',combined:'🔄 Kombiniert'};
  b.textContent=labels[state.selectedModule]||'';
  if(state.selectedModule==='security'){b.style.color='var(--accent)';b.style.borderColor='rgba(20,184,166,.2)';b.style.background='var(--accentDim)';}
  else if(state.selectedModule==='qm'){b.style.color='var(--orange)';b.style.borderColor='rgba(249,115,22,.2)';b.style.background='var(--orangeDim)';}
  else{b.style.color='var(--purple)';b.style.borderColor='rgba(167,139,250,.2)';b.style.background='var(--purpleDim)';}
}

    <div class="panel-title">Audit-Modul wählen</div>
    <p class="panel-sub">Wählen Sie, welche Bereiche geprüft werden. Module können auch separat betrieben werden.</p>

    </div>
    <div class="nav-row"><div></div><button class="btn-primary" onclick="next()" ${!state.selectedModule?'disabled style="opacity:.4;pointer-events:none"':''}>Weiter →</button></div>
  </div>`;
}
function selectModule(m){
  state.selectedModule=m;
  if(m==='security')state.selectedNorms=Object.keys(NORM_DEFS).filter(n=>NORM_DEFS[n].module==='security');
  else if(m==='qm')state.selectedNorms=Object.keys(NORM_DEFS).filter(n=>NORM_DEFS[n].module==='qm');
  else state.selectedNorms=Object.keys(NORM_DEFS);
  render();saveState();
}

// ── NORM SELECTION ──
function renderNormSelection(){
  const showSec=state.selectedModule==='security'||state.selectedModule==='combined';
  const showQm=state.selectedModule==='qm'||state.selectedModule==='combined';
  let h='';
  if(showSec){h+=`<div class="norm-group"><div class="norm-group-title sec">🛡️ Security-Normen</div><div class="norm-chips">${Object.entries(NORM_DEFS).filter(([,v])=>v.module==='security').map(([k])=>`<div class="norm-chip ${state.selectedNorms.includes(k)?'active':''}" onclick="toggleNorm('${k}')">${k}</div>`).join('')}</div></div>`;}
  if(showQm){h+=`<div class="norm-group"><div class="norm-group-title qm">📋 QM-Normen</div><div class="norm-chips">${Object.entries(NORM_DEFS).filter(([,v])=>v.module==='qm').map(([k])=>`<div class="norm-chip qm-chip ${state.selectedNorms.includes(k)?'active':''}" onclick="toggleNorm('${k}')">${k}</div>`).join('')}</div></div>`;}
  let det='';
  state.selectedNorms.forEach(nk=>{const nd=NORM_DEFS[nk];if(!nd)return;const isQm=nd.module==='qm';det+=`<div class="norm-details"><div class="nd-header" onclick="toggleND(this)"><div><span class="nd-title">${nd.fullName}</span><br><span style="font-size:.72rem;color:var(--muted)">${nd.desc}</span></div><span class="nd-arrow">▼</span></div><div class="nd-body"><div class="nd-content">${nd.reqs.map(r=>`<div class="nd-req ${isQm?'qm-req':''}"><span class="nd-req-num">${r.num}</span><span>${r.text}</span></div>`).join('')}</div></div></div>`;});
  document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">Normen & Standards</div><p class="panel-sub">Auswahl der zu prüfenden Normen. Klicken zum Aufklappen der Anforderungen.</p><div class="norm-selector">${h}</div><div class="section-divider"></div><div style="font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:10px">Anforderungskataloge</div>${det}<div class="nav-row"><button class="btn-secondary" onclick="prev()">← Zurück</button><button class="btn-primary" onclick="next()">Weiter →</button></div></div>`;
}
function toggleNorm(k){const i=state.selectedNorms.indexOf(k);if(i>-1)state.selectedNorms.splice(i,1);else state.selectedNorms.push(k);render();saveState();}

// ── CHECKLIST ──
function renderChecklist(check){
  const items=check.items.map(item=>{
    const f=state.findings[item.id]||{},s=f.status||'';
    // Find linked docs
    const linkedDocs=state.documents.filter(d=>d.checkpoints&&d.checkpoints.includes(item.id));
    let docHtml='';
    if(linkedDocs.length>0){docHtml=linkedDocs.map(d=>{const st=getDocStatus(d);return`<div class="ci-doc-link"><span class="doc-status ${st}"></span><a href="#" onclick="switchMode('database');return false;">${esc(d.name)}</a></div>`;}).join('');}
    else{docHtml=`<div class="ci-doc-link"><span class="doc-status gray"></span><span style="color:var(--soft);font-size:.68rem">Kein Dokument verknüpft</span></div>`;}
    return`<div class="check-item ${s?'status-'+s:''}" id="ci_${item.id}"><div class="ci-top"><div class="ci-text"><div class="ci-label">${item.label} <span class="module-indicator ${item.module==='qm'?'qm':'sec'}">${item.module==='qm'?'QM':'SEC'}</span></div><div class="ci-norm ${item.module==='qm'?'qm':''}">${item.norm}</div><div class="ci-desc">${item.desc}</div>${docHtml}</div><div class="ci-btns"><button class="ci-btn ok ${s==='ok'?'active':''}" onclick="setStatus('${item.id}','ok')">✓ OK</button><button class="ci-btn mangel ${s==='mangel'?'active':''}" onclick="setStatus('${item.id}','mangel')">⚠ Mangel</button><button class="ci-btn kritisch ${s==='kritisch'?'active':''}" onclick="setStatus('${item.id}','kritisch')">✕ Kritisch</button><button class="ci-btn na ${s==='na'?'active':''}" onclick="setStatus('${item.id}','na')">– N/A</button></div></div><div class="ci-note ${s&&s!=='ok'&&s!=='na'?'show':''}" id="note_${item.id}"><input placeholder="Notiz..." value="${esc(f.note||'')}" oninput="setNote('${item.id}',this.value)"></div></div>`;
  }).join('');
  const done=check.items.filter(i=>state.findings[i.id]?.status).length;
  const normBadges=check.norms.map(n=>{const nd=NORM_DEFS[n];return`<span class="norm-badge ${nd?.module==='qm'?'qm':'security'}">${n}</span>`;}).join('');
  document.getElementById('mainContent').innerHTML=`<div class="panel"><div>${normBadges}</div><div class="panel-title">${check.icon} ${check.label}</div><p class="panel-sub">${check.sub} <strong style="color:var(--accent)">${done}/${check.items.length}</strong> bewertet.</p><div class="check-section"><div class="check-section-title ${check.module==='qm'?'qm-section':''}">Prüfpunkte</div>${items}</div><div class="nav-row"><button class="btn-secondary" onclick="prev()">← Zurück</button><button class="btn-primary" onclick="next()">Weiter →</button></div></div>`;
}

function renderDatabase(){
  const docs=state.documents;
  const now=new Date();
  const warn30=new Date(now.getTime()+30*86400000);
  let greenC=0,yellowC=0,redC=0;
  docs.forEach(d=>{const s=getDocStatus(d);if(s==='green')greenC++;else if(s==='yellow')yellowC++;else if(s==='red')redC++;});

  const tabCounts={all:docs.length,compliance:0,expiring:yellowC+redC};
  // Count missing docs per norm
  let missingTotal=0;
  Object.entries(NORM_DEFS).forEach(([nk,nd])=>{
    const docsForNorm=docs.filter(d=>d.norms&&d.norms.includes(nk));
    if(docsForNorm.length<nd.reqs.length)missingTotal+=nd.reqs.length-docsForNorm.length;
  });
  tabCounts.compliance=missingTotal;

  let content='';
  if(state.dbTab==='compliance')content=renderComplianceView();
  else if(state.dbTab==='expiring')content=renderExpiringView();
  else content=renderAllDocsView();

  document.getElementById('mainContent').innerHTML=`<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <div><div class="panel-title">📁 Dokumenten-Datenbank</div><p style="font-size:.82rem;color:var(--muted);margin-top:2px">Zentrale Verwaltung aller Audit-relevanten Unterlagen mit Norm-Zuordnung und Ablaufüberwachung.</p></div>
      <button class="btn-primary" onclick="openDocModal()">+ Dokument hinzufügen</button>
    </div>
    <div class="db-stats">
      <div class="db-stat total"><div class="db-stat-val">${docs.length}</div><div class="db-stat-lbl">Dokumente gesamt</div></div>
      <div class="db-stat green"><div class="db-stat-val">${greenC}</div><div class="db-stat-lbl">Aktuell ✓</div></div>
      <div class="db-stat yellow"><div class="db-stat-val">${yellowC}</div><div class="db-stat-lbl">Läuft ab ⚠</div></div>
      <div class="db-stat red"><div class="db-stat-val">${redC}</div><div class="db-stat-lbl">Überfällig ✕</div></div>
    </div>
    <div class="db-tabs">
      <button class="db-tab ${state.dbTab==='all'?'active':''}" onclick="state.dbTab='all';render()">📄 Alle Dokumente <span class="count">${tabCounts.all}</span></button>
      <button class="db-tab ${state.dbTab==='compliance'?'active':''}" onclick="state.dbTab='compliance';render()">🔍 Compliance-Check <span class="count">${tabCounts.compliance}</span></button>
      <button class="db-tab ${state.dbTab==='expiring'?'active':''}" onclick="state.dbTab='expiring';render()">⏰ Ablauf-Tracker <span class="count">${tabCounts.expiring}</span></button>
    </div>
    ${content}
  </div>`;
}

function renderAllDocsView(){
  const docs=state.documents;
  if(docs.length===0)return`<div style="text-align:center;padding:40px 20px"><div style="font-size:2.5rem;margin-bottom:12px;opacity:.5">📁</div><div style="font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:6px">Noch keine Dokumente</div><div style="font-size:.84rem;color:var(--muted)">Fügen Sie Ihr erstes Dokument hinzu, um die Audit-Datenbank aufzubauen.</div></div>`;
  let h=`<div class="db-search"><input type="text" placeholder="🔍 Dokumente suchen..." oninput="filterDocs(this.value)"><select onchange="filterDocsCat(this.value)"><option value="">Alle Kategorien</option>${DOC_CATEGORIES.map(c=>`<option value="${c}">${CAT_ICONS[c]} ${c}</option>`).join('')}</select></div>`;
  h+=`<div class="doc-grid" id="docGrid">`;
  docs.forEach(d=>{h+=renderDocCard(d);});
  h+=`</div>`;
  return h;
}

function renderDocCard(d){
  const st=getDocStatus(d);
  const stLabel={green:'Aktuell',yellow:'Läuft ab',red:'Überfällig',gray:'Kein Ablauf'}[st];
  const normBadges=(d.norms||[]).map(n=>{const nd=NORM_DEFS[n];return`<span class="norm-badge ${nd?.module==='qm'?'qm':'security'}" style="margin-bottom:0;font-size:.5rem">${n}</span>`;}).join('');
  const cpCount=(d.checkpoints||[]).filter(c=>c).length;
  const expiryStr=d.expiry?new Date(d.expiry).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'}):'–';
  return`<div class="doc-card" data-cat="${d.category}" data-name="${(d.name||'').toLowerCase()}">
    <div class="doc-icon">${CAT_ICONS[d.category]||'📎'}</div>
    <div class="doc-body">
      <div class="doc-name">${esc(d.name)}</div>
      <div class="doc-meta">
        <span>${CAT_ICONS[d.category]} ${d.category}</span>
        <span>📅 ${expiryStr}</span>
        ${d.version?`<span>v${esc(d.version)}</span>`:''}
        ${cpCount?`<span>🔗 ${cpCount} Prüfpunkte</span>`:''}
      </div>
      <div class="doc-norms">${normBadges}</div>
    </div>
    <div class="doc-status-pill ${st}">● ${stLabel}</div>
    <div class="doc-actions">
      <button class="btn-sm" onclick="editDoc(${d.id})">✏️</button>
      <button class="btn-sm danger" onclick="deleteDoc(${d.id})">🗑️</button>
    </div>
  </div>`;
}

function renderComplianceView(){
  let h='<div style="font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:12px">Dokumentenabdeckung pro Norm-Anforderung</div>';
  Object.entries(NORM_DEFS).forEach(([nk,nd])=>{
    if(!state.selectedNorms.length || state.selectedNorms.includes(nk)){
      const docsForNorm=state.documents.filter(d=>d.norms&&d.norms.includes(nk));
      const covered=Math.min(docsForNorm.length,nd.reqs.length);
      const pct=nd.reqs.length>0?Math.round((covered/nd.reqs.length)*100):0;
      const barColor=pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--danger)';
      const pctColor=pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--danger)';
      h+=`<div class="compliance-norm"><div class="compliance-norm-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <div class="cn-left"><span class="norm-badge ${nd.module==='qm'?'qm':'security'}" style="margin:0">${nk}</span><span class="cn-name">${nd.fullName}</span></div>
        <div style="display:flex;align-items:center;gap:10px"><div class="cn-bar"><div class="cn-bar-fill" style="width:${pct}%;background:${barColor}"></div></div><span class="cn-pct" style="color:${pctColor}">${pct}%</span><span class="cn-arrow">▼</span></div>
      </div><div class="cn-body"><div class="cn-body-inner">`;
      nd.reqs.forEach(r=>{
        const reqDocs=docsForNorm.filter(d=>{
          // Check if any doc is loosely linked to this req
          return true; // simplified: all norm docs count
        });
        const hasDoc=reqDocs.length>0;
        h+=`<div class="cn-req-row"><span class="cn-req-num">${r.num}</span><span class="cn-req-text">${r.text}</span>
          <div class="cn-req-docs">${hasDoc?`<span class="doc-status-pill green" style="font-size:.5rem">● ${reqDocs.length} Dok.</span>`:`<span class="doc-status-pill red" style="font-size:.5rem">● Fehlt</span>`}</div>
        </div>`;
      });
      h+=`</div></div></div>`;
    }
  });
  return h;
}

function renderExpiringView(){
  const now=new Date();
  const warn30=new Date(now.getTime()+30*86400000);
  const expiring=state.documents.filter(d=>{
    if(!d.expiry)return false;
    const exp=new Date(d.expiry);
    return exp<=warn30;
  }).sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));

  if(expiring.length===0)return`<div style="text-align:center;padding:40px 20px"><div style="font-size:2rem;margin-bottom:10px">✅</div><div style="font-size:.95rem;font-weight:600;color:var(--ok);margin-bottom:4px">Keine ablaufenden Dokumente</div><div style="font-size:.82rem;color:var(--muted)">Alle Dokumente mit Ablaufdatum sind aktuell.</div></div>`;
  let h=`<div style="font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);margin-bottom:12px">⏰ Dokumente mit Handlungsbedarf</div><div class="doc-grid">`;
  expiring.forEach(d=>{h+=renderDocCard(d);});
  h+=`</div>`;
  return h;
}

// ── DOC STATUS ──
function getDocStatus(d){
  if(!d.expiry)return'gray';
  const now=new Date(),exp=new Date(d.expiry),warn30=new Date(now.getTime()+30*86400000);
  if(exp<now)return'red';
  if(exp<=warn30)return'yellow';
  return'green';
}

// ── DOC MODAL ──
function openDocModal(editId){
  state.editDocId=editId||null;
  const modal=document.getElementById('docModal');
  modal.classList.add('open');
  document.getElementById('docModalTitle').textContent=editId?'Dokument bearbeiten':'Dokument hinzufügen';

  // Populate norm chips
  const normChipsEl=document.getElementById('df_norms');
  normChipsEl.innerHTML=Object.entries(NORM_DEFS).map(([k,v])=>`<div class="norm-chip ${v.module==='qm'?'qm-chip':''}" data-norm="${k}" onclick="this.classList.toggle('active')" style="font-size:.7rem;padding:5px 10px">${k}</div>`).join('');

  // Populate checkpoints
  const cpEl=document.getElementById('df_checkpoints');
  cpEl.innerHTML=`<option value="">Keine Verknüpfung</option>`;
  getAllCheckpoints().forEach(cp=>{cpEl.innerHTML+=`<option value="${cp.id}">${cp.section} → ${cp.label}</option>`;});

  if(editId){
    const d=state.documents.find(x=>x.id===editId);

      document.getElementById('df_owner').value=d.owner||'';

      (d.norms||[]).forEach(n=>{const chip=normChipsEl.querySelector(`[data-norm="${n}"]`);if(chip)chip.classList.add('active');});
      (d.checkpoints||[]).forEach(cp=>{const opt=cpEl.querySelector(`option[value="${cp}"]`);if(opt)opt.selected=true;});
    }
  }else{
    document.getElementById('df_name').value='';
    document.getElementById('df_category').value='Richtlinie';
    document.getElementById('df_expiry').value='';
    document.getElementById('df_version').value='';

    document.getElementById('df_notes').value='';

function closeDocModal(){document.getElementById('docModal').classList.remove('open');state.editDocId=null;}

function saveDoc(){
  const name=document.getElementById('df_name').value.trim();
  if(!name){alert('Bitte Dokumentenname eingeben.');return;}
  const category=document.getElementById('df_category').value;
  const expiry=document.getElementById('df_expiry').value;
  const version=document.getElementById('df_version').value.trim();
  const owner=document.getElementById('df_owner').value.trim();
  const notes=document.getElementById('df_notes').value.trim();
  const norms=[...document.querySelectorAll('#df_norms .norm-chip.active')].map(el=>el.dataset.norm);
  const checkpoints=[...document.getElementById('df_checkpoints').selectedOptions].map(o=>o.value).filter(v=>v);
  const fileInput=document.getElementById('df_file');
  const fileName=fileInput.files.length>0?fileInput.files[0].name:'';

  if(state.editDocId){
    const d=state.documents.find(x=>x.id===state.editDocId);
    if(d){Object.assign(d,{name,category,expiry,version,owner,notes,norms,checkpoints,fileName:fileName||d.fileName});}
  }else{
    state.documents.push({id:Date.now(),name,category,expiry,version,owner,notes,norms,checkpoints,fileName,addedAt:new Date().toISOString()});
  }
  saveState();closeDocModal();render();
}
function editDoc(id){openDocModal(id);}
function deleteDoc(id){if(confirm('Dokument wirklich löschen?')){state.documents=state.documents.filter(d=>d.id!==id);saveState();render();}}

function filterDocs(val){
  val=val.toLowerCase();
  document.querySelectorAll('.doc-card').forEach(c=>{c.style.display=c.dataset.name.includes(val)?'':'none';});
}
function filterDocsCat(val){
  document.querySelectorAll('.doc-card').forEach(c=>{c.style.display=(!val||c.dataset.cat===val)?'':'none';});
}

  ac.forEach(ch=>ch.items.forEach(item=>{const f=state.findings[item.id],s=f?.status;if(s==='ok')ok++;else if(s==='na')na++;else if(s==='kritisch'){k.push({...item,note:f?.note||'',section:ch.label,icon:ch.icon});const[a,b]=parseCost(item.costs.kritisch);costMin+=a;costMax+=b;}else if(s==='mangel'){m.push({...item,note:f?.note||'',section:ch.label,icon:ch.icon});const[a,b]=parseCost(item.costs.mangel);costMin+=a;costMax+=b;}else na2++;}));

      <div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);text-align:center"><div style="font-family:var(--fh);font-size:1.5rem;font-weight:800;color:var(--text2)">${compPct}%</div><div style="font-family:var(--fm);font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)">Compliance</div></div>
    </div>
    ${docCount>0?`<div style="background:var(--orangeDim);border:1px solid rgba(249,115,22,.2);border-radius:var(--rpill);padding:6px 14px;font-size:.78rem;color:var(--orange);font-weight:600">📁 ${docCount} Dokumente${docExpiring>0?` · ⚠ ${docExpiring} ablaufend`:''}</div>`:''}
  </div>
  ${k.length>0?`<div style="margin-bottom:18px"><div class="prio-title k">✕ Kritisch (${k.length})</div>${k.map(f=>fr(f,'kritisch')).join('')}</div>`:''}
  ${m.length>0?`<div style="margin-bottom:18px"><div class="prio-title m">⚠ Mängel (${m.length})</div>${m.map(f=>fr(f,'mangel')).join('')}</div>`:''}
  ${k.length===0&&m.length===0?`<div style="background:var(--okDim);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:24px;text-align:center;margin-bottom:20px"><div style="font-size:1.8rem;margin-bottom:6px">✅</div><div style="font-size:.95rem;font-weight:700;color:#4ade80">Keine Mängel</div></div>`:''}
  <div class="cost-summary">
    <div style="font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px">Investitionsbedarf</div>
    <div class="cost-row"><span>Sofortmaßnahmen</span><span>€ ${fmtCA(k,'kritisch')}</span></div>
    <div class="cost-row"><span>Mittelfristige Maßnahmen</span><span>€ ${fmtCA(m,'mangel')}</span></div>
    <div class="cost-row"><span>Gesamt</span><span>€ ${costMin.toLocaleString('de-DE')} – ${costMax.toLocaleString('de-DE')}</span></div>
  </div>
  <div style="background:linear-gradient(135deg,rgba(20,184,166,.04),rgba(249,115,22,.03));border:1px solid rgba(20,184,166,.12);border-radius:12px;padding:20px;text-align:center">
    <div style="font-size:.68rem;color:var(--soft);margin-bottom:4px">Erstellt mit</div>
    <div style="font-family:var(--fh);font-weight:700;color:var(--text2)">SecureStay: Analytics</div>
    <div style="font-size:.8rem;color:var(--muted);margin-top:3px">SecureStay Solutions UG (haftungsbeschränkt)</div>
    <div style="font-size:.72rem;color:var(--soft);margin-top:2px">Kirchstr. 8b · 55270 Essenheim · securestay@outlook.de · +49 174 6703741</div>
  </div>
  <div class="nav-row"><button class="btn-secondary" onclick="prev()">← Zurück</button><button class="btn-primary" onclick="window.print()">🖨 Drucken / PDF</button></div>`;
}

// ═══ HELPERS ═══
function parseCost(s){if(!s)return[0,0];const p=s.replace(/\./g,'').split('–').map(x=>parseInt(x.replace(/\D/g,''))||0);return[p[0]||0,p[1]||p[0]||0];}
function fmtCA(items,p){let mn=0,mx=0;items.forEach(f=>{const[a,b]=parseCost(f.costs[p]);mn+=a;mx+=b;});if(mn===0&&mx===0)return'0';return`${mn.toLocaleString('de-DE')} – ${mx.toLocaleString('de-DE')}`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(id,s){if(!state.findings[id])state.findings[id]={status:'',note:''};state.findings[id].status=s;const ci=document.getElementById('ci_'+id);if(!ci)return;ci.className='check-item status-'+s;ci.querySelectorAll('.ci-btn').forEach(b=>b.classList.toggle('active',b.classList.contains(s)));const n=document.getElementById('note_'+id);if(n)n.classList.toggle('show',s==='mangel'||s==='kritisch');saveState();}
function setNote(id,v){if(!state.findings[id])state.findings[id]={status:'',note:''};state.findings[id].note=v;saveState();}
function goTo(i){state.currentStep=i;render();scrollTo(0,0);saveState();}
function next(){const s=getSteps();if(state.currentStep<s.length-1){state.currentStep++;render();scrollTo(0,0);saveState();}}
function prev(){if(state.currentStep>0){state.currentStep--;render();scrollTo(0,0);saveState();}}

// INIT
render();
</script>
</body>
</html>
